<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Line | Welcome</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #fdf9d8;
            --card-bg: white;
            --text: #2c3e50;
        }

        /* Night Mode Styles */
        body.dark-mode {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        h1 { color: var(--text); margin: 0; font-size: 32px; }

        .motto { font-style: italic; color: #777; margin-bottom: 30px; line-height: 1.4; }
        body.dark-mode .motto { color: #aaa; }

        .auth-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        body.dark-mode .auth-box { border-color: #333; }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background: white;
            color: black;
        }
        body.dark-mode input, body.dark-mode select {
            background: #2c2c2c;
            border-color: #444;
            color: white;
        }

        .btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
        }

        .btn-quick { background: #2ecc71; color: white; margin-top: 10px; }

        .toggle-link { display: block; margin-top: 20px; color: #3498db; cursor: pointer; font-size: 15px; }

        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle { font-size: 24px; cursor: pointer; background: none; border: none; }

        .lang-switch img { width: 30px; cursor: pointer; border-radius: 5px; }

        .g-recaptcha { display: flex; justify-content: center; margin: 15px 0; }

        #register-form { display: none; }

        /* GDPR Banner Style */
        #gdpr-consent {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            border-top: 3px solid #f1c40f;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div class="lang-switch">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" onclick="setLang('el')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg" onclick="setLang('en')">
        </div>
    </div>

    <div class="container">
        <span style="font-size:60px;">🚕</span>
        <h1>Taxi-Line</h1>
        <p class="motto" id="txt-motto"></p>
  <footer style="margin-top: 20px; padding: 20px 0; border-top: 1px solid #ddd; font-size: 13px; color: #7f8c8d;">
        <p>© 2026 Taxi-Line. All rights reserved.</p>
     </footer>

        <div class="auth-box">
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn" onclick="handleLogin()" id="btn-login-label"></button>
                <span class="toggle-link" onclick="showForm('reg')" id="link-to-reg"></span>
            </div>

            <div id="register-form">
    <input type="email" id="reg-email" placeholder="Email">
    <input type="password" id="reg-pass" placeholder="Password (6+ chars)">
    
    <select id="reg-role" onchange="toggleDriverFields(this.value)">
        <option value="passenger">Επιβάτης / Passenger</option>
        <option value="driver">Οδηγός Ταξί / Driver</option>
    </select>

    <div id="driver-extra-fields" style="display:none;">
        <input type="text" id="reg-name" placeholder="Ονοματεπώνυμο">
        <input type="text" id="reg-phone" placeholder="Τηλέφωνο">
        <input type="text" id="reg-plate" placeholder="Αριθμός Πινακίδας">
        <input type="text" id="reg-taxi-num" placeholder="Αριθμός Ταξί (π.χ. 28)">
        <input type="text" id="reg-license" placeholder="Αριθμός Αδείας ΕΔΧ">
    </div>

    <div class="g-recaptcha" data-sitekey="6LfY_4IsAAAAAMRRNMSZPHD_Q3wB59JKd3y6xFJh"></div>
    <button class="btn" onclick="handleSignup()" id="btn-reg-label"></button>
    <span class="toggle-link" onclick="showForm('login')" id="link-to-login"></span>
</div>

        <button class="btn btn-quick" onclick="window.location.href='quick-call.html'" id="btn-quick-label"></button>

        <p style="margin-top:40px;color:#7f8c8d;font-size:14px;" id="txt-support"></p>
        <p style="font-weight:bold;">
            Email: akisss70@gmail.com<br>
            📞 +30 6999222446
        </p>
    </div>

    <div id="gdpr-consent">
        <p style="margin:0 0 15px 0; font-size:14px; line-height:1.4;">
            🛡️ <b>Προστασία Δεδομένων:</b> Χρησιμοποιώντας το Taxi-Line, αποδέχεστε τη συλλογή και χρήση της <b>τοποθεσίας σας</b> σε πραγματικό χρόνο για τη λειτουργία της υπηρεσίας, σύμφωνα με τους κανονισμούς GDPR.
        </p>
        <button onclick="acceptGDPR()" style="background:#f1c40f; color:black; border:none; padding:10px 30px; border-radius:5px; font-weight:bold; cursor:pointer;">ΑΠΟΔΟΧΗ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig={
            apiKey:"AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain:"taxi-line-f149e.firebaseapp.com",
            databaseURL:"https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId:"taxi-line-f149e",
            storageBucket:"taxi-line-f149e.firebasestorage.app",
            messagingSenderId:"1086896421565",
            appId:"1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth=firebase.auth();
        const database=firebase.database();

        let lang=localStorage.getItem('lang')||'el';

        const translations={
            el:{
                motto:"Η φιλική σας υπηρεσία ταξί - συνδέουμε επιβάτες και οδηγούς γρήγορα και εύκολα",
                login:"ΣΥΝΔΕΣΗ",
                toReg:"Δεν έχετε λογαριασμό; Εγγραφή",
                toLogin:"Έχετε ήδη λογαριασμό; Σύνδεση",
                quick:"📞 ΚΑΛΕΣΤΕ ΤΑΞΙ ΧΩΡΙΣ ΕΓΓΡΑΦΗ",
                reg:"ΔΗΜΙΟΥΡΓΙΑ ΛΟΓΑΡΙΑΣΜΟΥ",
                support:"Έχετε ερωτήσεις ή χρειάζεστε υποστήριξη; Επικοινωνήστε μαζί μας!"
            },
            en:{
                motto:"Your friendly taxi service - we connect passengers with drivers quickly and easily",
                login:"LOGIN",
                toReg:"Don't have an account? Sign up here",
                toLogin:"Already have an account? Login",
                quick:"📞 CALL WITHOUT SIGNUP",
                reg:"CREATE ACCOUNT",
                support:"Do you have questions or need support? Contact us!"
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('taxi-theme', mode);
        }
function toggleDriverFields(role) {
    const extraFields = document.getElementById('driver-extra-fields');
    if (role === 'driver') {
        extraFields.style.display = 'block';
    } else {
        extraFields.style.display = 'none';
    }
}
        function acceptGDPR() {
            localStorage.setItem('gdpr-accepted', 'true');
            document.getElementById('gdpr-consent').style.display = 'none';
        }

        function applyLang(){
            const t=translations[lang];
            document.getElementById('txt-motto').innerText=t.motto;
            document.getElementById('btn-login-label').innerText=t.login;
            document.getElementById('link-to-reg').innerText=t.toReg;
            document.getElementById('btn-reg-label').innerText=t.reg;
            document.getElementById('link-to-login').innerText=t.toLogin;
            document.getElementById('btn-quick-label').innerText=t.quick;
            document.getElementById('txt-support').innerText=t.support;
        }

        function setLang(l){
            lang=l;
            localStorage.setItem('lang',l);
            applyLang();
        }

        function showForm(type){
            document.getElementById('login-form').style.display=(type==='login'?'block':'none');
            document.getElementById('register-form').style.display=(type==='reg'?'block':'none');
        }

        async function handleSignup() {
    if (typeof grecaptcha === "undefined" || grecaptcha.getResponse().length === 0) {
        alert("Παρακαλώ επιβεβαιώστε το reCAPTCHA");
        return;
    }
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const role = document.getElementById('reg-role').value;

    if (email === "" || pass.length < 6) {
        alert("Συμπληρώστε σωστά τα στοιχεία.");
        return;
    }

    try {
        const res = await auth.createUserWithEmailAndPassword(email, pass);
        
        // Δημιουργία αντικειμένου με τα βασικά στοιχεία
        const userData = {
            email: email,
            role: role,
            status: (role === 'driver' ? 'pending' : 'approved')
        };

        // Αν είναι οδηγός, προσθέτουμε τα επιπλέον στοιχεία
        if (role === 'driver') {
            userData.name = document.getElementById('reg-name').value;
            userData.phone = document.getElementById('reg-phone').value;
            userData.plate = document.getElementById('reg-plate').value;
            userData.taxiNumber = document.getElementById('reg-taxi-num').value;
            userData.license = document.getElementById('reg-license').value;
        }

        await database.ref('users/' + res.user.uid).set(userData);

        alert("Η εγγραφή ολοκληρώθηκε! Αν είστε οδηγός, περιμένετε έγκριση από τον διαχειριστή.");
        grecaptcha.reset();
        showForm('login');
    } catch (e) { 
        alert(e.message); 
    }
}

        async function handleLogin(){
            const email=document.getElementById('login-email').value.trim();
            const pass=document.getElementById('login-pass').value;
            if(email===""||pass===""){
                alert("Συμπληρώστε email και password");
                return;
            }
            try{
                await auth.signInWithEmailAndPassword(email,pass);
                window.location.href="dashboard.html";
            }catch(e){ alert(e.message); }
        }

        window.onload = function() {
            applyLang();
            // Φόρτωση θέματος
            if (localStorage.getItem('taxi-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
            // Έλεγχος GDPR
            if (!localStorage.getItem('gdpr-accepted')) {
                document.getElementById('gdpr-consent').style.display = 'block';
            }
        };
    </script>
</body>
</html>
