<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Line | Είσοδος</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root { --primary: #f1c40f; --secondary: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: var(--secondary); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-yellow { background: var(--primary); color: black; }
        .btn-yellow:hover { background: #d4ac0d; }
        .toggle-link { color: #3498db; cursor: pointer; margin-top: 15px; display: block; font-size: 14px; }
        #register-form { display: none; }
        .g-recaptcha { display: flex; justify-content: center; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="login-form">
            <h2>🚕 Taxi-Line</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-pass" placeholder="Κωδικός" required>
                <button type="submit" class="btn btn-yellow">ΣΥΝΔΕΣΗ</button>
            </form>
            <span class="toggle-link" onclick="showRegister()">Δεν έχετε λογαριασμό; Εγγραφή</span>
        </div>

        <div id="register-form">
            <h2>Νέα Εγγραφή</h2>
            <form onsubmit="handleSignup(event)">
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-pass" placeholder="Κωδικός (6+ χαρακτήρες)" required>
                <select id="reg-role" onchange="toggleTaxiInput()">
                    <option value="passenger">Επιβάτης</option>
                    <option value="driver">Οδηγός Ταξί</option>
                </select>
                <input type="text" id="reg-taxi" placeholder="Αριθμός Κυκλοφορίας Ταξί" style="display:none;">
                
                <div class="g-recaptcha" data-sitekey="6Lf934IsAAAAAEEpTIhOGGzuEqdbrf0ialSHyMT8"></div>
                
                <button type="submit" class="btn btn-yellow">ΕΓΓΡΑΦΗ</button>
            </form>
            <span class="toggle-link" onclick="showLogin()">Έχετε ήδη λογαριασμό; Σύνδεση</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e",
            storageBucket: "taxi-line-f149e.firebasestorage.app",
            messagingSenderId: "1086896421565",
            appId: "1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function showRegister() { 
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }
        function showLogin() { 
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }
        function toggleTaxiInput() {
            const role = document.getElementById('reg-role').value;
            document.getElementById('reg-taxi').style.display = (role === 'driver') ? 'block' : 'none';
        }

        // --- SIGNUP LOGIC ---
        async function handleSignup(e) {
            e.preventDefault();

            // Έλεγχος reCAPTCHA
            const captchaResponse = grecaptcha.getResponse();
            if (captchaResponse.length === 0) {
                alert("Παρακαλώ επιβεβαιώστε ότι δεν είστε ρομπότ!");
                return;
            }

            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            const taxi = document.getElementById('reg-taxi').value;

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Αποστολή Email Επαλήθευσης
                await user.sendEmailVerification();
                alert("Η εγγραφή ολοκληρώθηκε! Σας στείλαμε email επαλήθευσης στο " + email + ". Παρακαλώ πατήστε το σύνδεσμο στο email σας ΠΡΙΝ συνδεθείτε.");

                // Αποθήκευση στοιχείων στο Database
                await database.ref('users/' + user.uid).set({
                    email: email,
                    role: role,
                    taxiNumber: (role === 'driver') ? taxi : null,
                    createdAt: Date.now()
                });

                // Αποσύνδεση μέχρι να κάνει verify
                await auth.signOut();
                grecaptcha.reset();
                showLogin();
            } catch (error) {
                alert("Σφάλμα εγγραφής: " + error.message);
            }
        }

        // --- LOGIN LOGIC ---
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Έλεγχος αν το email έχει επαληθευτεί
                if (!user.emailVerified) {
                    alert("⚠️ Το email σας δεν έχει επαληθευτεί ακόμα. Παρακαλώ ελέγξτε τα εισερχόμενά σας (και τα Spam).");
                    await auth.signOut();
                    return;
                }

                // Αν είναι verified, πάμε στο dashboard
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Σφάλμα σύνδεσης: " + error.message);
            }
        }
    </script>
</body>
</html>
