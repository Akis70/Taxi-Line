<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Line | Welcome</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root { --primary: #f1c40f; --bg: #fdf9d8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 450px; text-align: center; }
        .auth-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #register-form, #driver-modal { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚕 Taxi-Line</h1>
        <div class="auth-box">
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn" onclick="handleLogin()">ΣΥΝΔΕΣΗ</button>
                <p onclick="showForm('reg')" style="color:blue; cursor:pointer;">Δεν έχετε λογαριασμό; Εγγραφή</p>
            </div>

            <div id="register-form">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-pass" placeholder="Password">
                <select id="reg-role"><option value="passenger">Επιβάτης</option><option value="driver">Οδηγός</option></select>
                <div class="g-recaptcha" data-sitekey="6Lf934IsAAAAAEEpTIhOGGzuEqdbrf0ialSHyMT8"></div>
                <button class="btn" onclick="handleSignup()">ΕΓΓΡΑΦΗ</button>
                <p onclick="showForm('login')" style="color:blue; cursor:pointer;">Έχετε λογαριασμό; Σύνδεση</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // 1. Αρχικοποίηση
        const firebaseConfig = { /* ΒΑΛΕ ΤΑ ΣΤΟΙΧΕΙΑ ΣΟΥ ΕΔΩ */ };
        firebase.initializeApp(firebaseConfig);
        
        // Ορίζουμε τις μεταβλητές καθολικά
        const auth = firebase.auth();
        const database = firebase.database();

        function showForm(type) {
            document.getElementById('login-form').style.display = (type==='login'?'block':'none');
            document.getElementById('register-form').style.display = (type==='reg'?'block':'none');
        }

        // Συναρτήσεις που πλέον "βλέπουν" το auth/database γιατί είναι global
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await auth.signInWithEmailAndPassword(email, pass);
                window.location.href = "dashboard.html";
            } catch(e) { alert(e.message); }
        }

        async function handleSignup() {
            // (Εδώ η λογική για το modal του οδηγού που φτιάξαμε)
            alert("Εγγραφή - Λογική σε εξέλιξη");
        }
    </script>
</body>
</html>
