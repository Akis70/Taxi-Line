<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Line | Εγγραφή</title>
    <style>
        :root { --primary: #f1c40f; --secondary: #2c3e50; --bg: #f4f4f4; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .hidden { display: none; }
        .driver-info { background: #fffde7; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #fbc02d; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📝 Εγγραφή Χρήστη</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Κωδικός">
        <input type="tel" id="phone" placeholder="Τηλέφωνο (π.χ. 69...)">

        <select id="role" onchange="toggleFields()">
            <option value="passenger">👤 Επιβάτης</option>
            <option value="driver">🚕 Οδηγός Ταξί</option>
        </select>

        <div id="driver-fields" class="hidden driver-info">
            <p style="margin-top:0; font-size:12px; color:#555;">Στοιχεία Επαγγελματία Οδηγού:</p>
            <input type="text" id="fullname" placeholder="Ονοματεπώνυμο">
            <input type="text" id="plate" placeholder="Αριθμός Κυκλοφορίας (π.χ. ΤΑΒ-1234)">
            <input type="text" id="taxi-id" placeholder="Αριθμός Ταξί (π.χ. 542)">
            <input type="text" id="edx" placeholder="Αρ. Ειδικής Άδειας ΕΔΧ">
        </div>

        <button class="btn" onclick="signUp()">ΔΗΜΙΟΥΡΓΙΑ ΛΟΓΑΡΙΑΣΜΟΥ</button>
        <a href="index.html" style="display:block; margin-top:15px; font-size:14px; color:#777;">Έχετε ήδη λογαριασμό; Σύνδεση</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e",
            storageBucket: "taxi-line-f149e.firebasestorage.app",
            messagingSenderId: "1086896421565",
            appId: "1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function toggleFields() {
            document.getElementById('driver-fields').classList.toggle('hidden', document.getElementById('role').value !== 'driver');
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const role = document.getElementById('role').value;

            if(!email || !password || !phone) return alert("Συμπληρώστε τα βασικά στοιχεία!");

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                const userData = {
                    email, phone, role,
                    uid: cred.user.uid,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                };

                if(role === 'driver') {
                    userData.fullName = document.getElementById('fullname').value;
                    userData.plate = document.getElementById('plate').value;
                    userData.taxiID = document.getElementById('taxi-id').value;
                    userData.licenseEDX = document.getElementById('edx').value;
                    userData.approved = false; // Αναμονή έγκρισης
                }

                await database.ref('users/' + cred.user.uid).set(userData);
                alert("Η εγγραφή ολοκληρώθηκε! Οι οδηγοί απαιτούν έγκριση από τον διαχειριστή.");
                window.location.href = "dashboard.html";
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
