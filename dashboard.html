    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e",
            storageBucket: "taxi-line-f149e.firebasestorage.app",
            messagingSenderId: "1086896421565",
            appId: "1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map, userMarker, myData = null;
        let isOnline = false;
        let currentCallId = null;
        let driverMarkers = {};
        let selectedDriverId = null;
        
       auth.onAuthStateChanged(user => {
    if (!user) { 
        window.location.href = "index.html"; 
        return; 
    }

    database.ref('users/' + user.uid).once('value', snap => {
        myData = snap.val();
        const userTag = document.getElementById('user-tag');
        if (userTag) userTag.innerText = myData.email;
        
        renderView(user.uid);
    });

    database.ref('active_drivers/' + user.uid).on('value', snap => {
        const isOnline = snap.exists();
        if (typeof updateDriverUI === "function") {
            updateDriverUI(isOnline);
        }
    });
});

window.toggleWorkStatus = function() {
    const uid = auth.currentUser.uid;
    
    if (!isOnline) {
        if (!window.currentLat || !window.currentLng) { 
            alert("📍 Το GPS δεν έχει κλειδώσει ακόμα. Περιμένετε 2-3 δευτερόλεπτα!"); 
            return; 
        }

        const taxiNum = (myData && myData.taxiNumber) ? myData.taxiNumber : "---";
        if (taxiNum === "---") {
            alert("Σφάλμα: Δεν βρέθηκε ο αριθμός ταξί στο προφίλ σας.");
            return;
        }
        
        isOnline = true;
        updateDriverUI(true);

        database.ref('active_drivers/' + uid).set({
            lat: window.currentLat,
            lng: window.currentLng,
            taxiNumber: taxiNum,
            timestamp: Date.now()
        }).then(() => {
            database.ref('active_drivers/' + uid).onDisconnect().remove();
        });

    } else {
        isOnline = false;
        updateDriverUI(false); 
        
        database.ref('active_drivers/' + uid).onDisconnect().cancel();
        
        database.ref('active_drivers/' + uid).remove()
            .then(() => { console.log("Driver went offline successfully."); })
            .catch((error) => { console.error("Error going offline:", error); });
    }
};
        
        function updateDriverUI(online) {
    const btn = document.getElementById('work-btn'); // Το κουμπί που αλλάζει
    const badge = document.getElementById('driver-status-badge');
    const prio = document.getElementById('priority-ui');
    const driverMapContainer = document.getElementById('map-container'); // Προσοχή στο ID
    const mainContainer = document.getElementById('main-container');

    if (online) {

        if (btn) { 
            btn.innerText = "🛑 GO OFFLINE"; 
            btn.className = "btn btn-red"; 
        }
        if (badge) { 
            badge.innerText = "ONLINE"; 
            badge.style.backgroundColor = "#2ecc71"; 
        }
        if (prio) {
            prio.style.display = "block";
        } else if (mainContainer) {
            mainContainer.innerHTML = `
                <div class="card" id="priority-ui">
                    <h3 style="margin-top:0;">📊 Λίστα Προτεραιότητας</h3>
                    <div id="priority-list">Φόρτωση...</div>
                </div>
            `;
        }
        if (typeof watchPriority === "function") {
            watchPriority(auth.currentUser.uid);
        }

    } else {

        if (btn) { 
            btn.innerText = "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ"; 
            btn.className = "btn btn-yellow"; 
        }
        if (badge) { 
            badge.innerText = "OFFLINE"; 
            badge.style.backgroundColor = "#e74c3c"; 
        }

        if (prio) prio.style.display = "none";
        if (driverMapContainer) driverMapContainer.style.display = "none";
        
        if (mainContainer) {
            mainContainer.innerHTML = `<div class="card">📴 Είστε εκτός βάρδιας. Πατήστε "Έναρξη" για να μπείτε στη λίστα.</div>`;
        }

        if (window.tripLine && window.map) window.map.removeLayer(window.tripLine);
        if (window.paxMarker && window.map) window.map.removeLayer(window.paxMarker);
    }
}
                         
        function renderView(uid) {
    const container = document.getElementById("main-container");
    
    if (myData.role === 'driver') {
    container.innerHTML = `
        <div class="card">
            <h2>🚕 Ταξί: ${myData.taxiNumber}</h2>
            <div id="driver-status-badge" style="background:#e74c3c; color:white; display:inline-block; padding:5px 15px; border-radius:20px; font-weight:bold; margin-bottom:10px;">OFFLINE</div>
            <button id="work-btn" class="btn btn-yellow" onclick="toggleWorkStatus()">🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ</button>
        </div>

        <div id="priority-ui" class="card" style="display:none;">
            <h3>📋 Λίστα Προτεραιότητας</h3>
            <div id="priority-list">Φόρτωση...</div>
        </div>

        <div id="map-container" style="display:none;">
            <div class="card">
                <div id="map" style="height:350px; border-radius:8px;"></div>
                <div id="driver-actions" style="margin-top:10px;"></div> 
            </div>
        </div>

        <button class="logout-btn-footer" onclick="logout()">Αποσύνδεση</button>

        <div id="incoming-call-overlay" class="overlay" style="display:none; background: rgba(0,0,0,0.9); z-index: 10000;">
            <div class="card" style="text-align:center; border: 2px solid #f1c40f;">
                <h2 style="color:#f1c40f;">🚕 ΝΕΑ ΚΛΗΣΗ!</h2>
                <div id="call-details" style="background: #333; color:white; padding: 15px; border-radius: 8px; margin: 15px 0;"></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-yellow" onclick="acceptCall()" style="flex:1; font-size:1.2em;">ΑΠΟΔΟΧΗ</button>
                    <button class="btn" onclick="rejectCall()" style="flex:1; background:#e74c3c; color:white;">ΑΠΟΡΡΙΨΗ</button>
                </div>
            </div>
        </div>
    `;
} else {
    container.innerHTML = `
        <div class="card" style="padding:10px;">
            <h3>📍 Επιλέξτε Ταξί κοντά σας</h3>
            <div id="map" style="height: 400px; border-radius: 8px;"></div>
        </div>
        
        <div id="status-box" class="card" style="display:none; border:2px solid #f1c40f; position: fixed; bottom: 80px; left: 10px; right: 10px; z-index: 9999;">
            <h3 id="pass-trip-status">Αναμονή...</h3>
        </div>

        <div class="card">
            <a href="tel:6999222446" class="btn btn-yellow" style="text-decoration: none;">📞 Ή Καλέστε ένα Ταξί</a>
        </div>

        <button class="logout-btn-footer" onclick="logout()">Αποσύνδεση</button>
        
        <div id="order-popup" class="overlay" style="display:none;">
            <div class="card" style="width:280px;">
                <h3>Κράτηση Ταξί</h3>
                <label>Άτομα: <input type="number" id="passengers" value="1" min="1" max="4"></label><br><br>
                <label><input type="checkbox" id="luggage"> Έχω αποσκευές</label><br><br>
                <button class="btn btn-yellow" onclick="window.requestTaxi()" style="width:100%; font-size:18px; font-weight:bold;">🚕 ΚΛΗΣΗ ΤΩΡΑ</button>
                <button class="btn" onclick="closeOrderPopup()">Ακύρωση</button>
            </div>
        </div>
    `;
}
    setTimeout(() => initMap(uid), 300);

    if (myData.role === 'driver') { 
        watchPriority(uid); 
        listenForCalls(uid); 
    } else { 
        listenForResponse(uid); 
    }
}

function initMap(uid) {

    window.map = L.map('map').setView([40.5215, 21.2634], 14); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.map); 

    navigator.geolocation.watchPosition(pos => { 
        const lat = pos.coords.latitude; 
        const lng = pos.coords.longitude; 
        
        window.currentLat = lat;
        window.currentLng = lng;

        if (!window.userMarker) { 
            window.userMarker = L.marker([lat, lng]).addTo(window.map).bindPopup("Εσείς"); 
            window.map.setView([lat, lng], 15); 
        } else { 
            window.userMarker.setLatLng([lat, lng]); 
        } 

        if (isOnline && myData.role === 'driver') { 
            database.ref('active_drivers/' + uid).update({ lat, lng, timestamp: Date.now() }); 
        } 
    }, null, { enableHighAccuracy: true }); 

    if (myData.role === 'passenger') watchDriversForPassenger(); 
}
        
        function watchDriversForPassenger() {
    database.ref('active_drivers').on('value', snap => {
        const drivers = snap.val() || {};

        window.map.eachLayer(layer => {
            if (layer instanceof L.Marker && layer !== window.userMarker) {
                window.map.removeLayer(layer);
            }
        });

        window.driverMarkers = {}; 

        const myPos = window.userMarker ? window.userMarker.getLatLng() : {lat: 40.5215, lng: 21.2634};

        for (let id in drivers) {
            const d = drivers[id];

            if (window.selectedDriverId === id) {
                continue; 
            }
        
            if (window.currentCall && window.currentCall.targetDriverId === id) {
                continue; 
            }
            
            if (!d.lat || !d.lng || !d.taxiNumber || d.taxiNumber === "---") {
                continue; 
            }

            const dist = window.map.distance([myPos.lat, myPos.lng], [d.lat, d.lng]);
            
            if (dist < 5000) { 
                const taxiIcon = L.divIcon({
                    html: `
                        <div class="custom-taxi-icon">
                            <span class="taxi-plate-label">${d.taxiNumber}</span>
                            <span class="taxi-emoji">🚕</span>
                        </div>`,
                    className: '', 
                    iconSize: [60, 60], 
                    iconAnchor: [30, 50] 
                });

                const marker = L.marker([d.lat, d.lng], { icon: taxiIcon }).addTo(window.map);
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e); 
                    selectedDriverId = id;
                    console.log("Επιλέχθηκε ο οδηγός:", selectedDriverId);
                    document.getElementById('order-popup').style.display = 'flex';
                });

                window.driverMarkers[id] = marker;
            }
        }
    });
}
        
        window.confirmOrder = function() {
    const pax = document.getElementById('pax').value;
    const lug = document.getElementById('luggage').checked;
    const uid = auth.currentUser.uid;
    
    if (!selectedDriverId) {
        alert("Παρακαλώ επιλέξτε ταξί!");
        return;
    }

    const newCallRef = database.ref('calls').push();
    newCallRef.set({
        passengerId: uid,
        targetDriverId: selectedDriverId,
        passengers: pax,
        luggage: lug ? "ΝΑΙ" : "ΟΧΙ",
        status: 'pending',
        lat: userMarker.getLatLng().lat,
        lng: userMarker.getLatLng().lng,
        timestamp: Date.now()
    }).then(() => {
        closeOrderPopup();
        const s = document.getElementById('status-box');
        s.style.display = 'block';
        s.style.background = '#f1c40f';
        s.innerHTML = "⏳ Η κλήση στάλθηκε! Περιμένετε αποδοχή...";
        
        listenForResponse(uid);
    }).catch(err => alert("Σφάλμα: " + err.message));
};

window.listenForResponse = function(uid) {
    const halfHourAgo = Date.now() - (30 * 60 * 1000);

    database.ref('calls').orderByChild('passengerId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        const s = document.getElementById('status-box');
        
        if (!s) return;

        if (!calls) { 
            s.style.display = 'none'; 
            if (window.passengerTripLine && window.map) window.map.removeLayer(window.passengerTripLine);
            return; 
        }

        for (let id in calls) {
            const c = calls[id];

            if (c.timestamp < halfHourAgo || c.status === 'completed') continue;

            if (c.status === "pending") {
                s.style.display = 'block';
                s.style.background = '#f1c40f';
                s.style.color = 'black';
                s.innerHTML = `<h3>⏳ Αναμονή αποδοχής...</h3><p>Το αίτημα στάλθηκε στον οδηγό.</p>`;
            } 
            else if (c.status === "accepted") {
                s.style.display = 'block';
                s.style.background = '#27ae60';
                s.style.color = 'white';
                s.innerHTML = `<h3>✅ Έρχεται!</h3><p>Το ταξί <b>${c.taxiNumber || ''}</b> αποδέχτηκε την κλήση και θα είναι εκεί σε ${c.eta || '?'} λεπτά.</p>`;
            } 
            else if (c.status === "arrived") {
                s.style.display = 'block';
                s.style.background = '#3498db';
                s.style.color = 'white';
                s.innerHTML = `<h3>🚕 Έφτασε!</h3><p>Ο οδηγός είναι στο σημείο.</p>`;
            }
            else if (c.status === "rejected") {
                s.style.display = 'block';
                s.style.background = '#e74c3c';
                s.style.color = 'white';
                s.innerHTML = `<h3>❌ Απορρίφθηκε</h3><p>Ο οδηγός δεν μπορεί να εξυπηρετήσει αυτή τη στιγμή.</p>`;
                setTimeout(() => { s.style.display = 'none'; }, 5000);
            }
        }
    }); 
}; 
        
window.acceptCall
        
window.rejectCall = function() {
    if (window.currentCallId) {
        database.ref('calls/' + window.currentCallId).update({
            status: 'rejected'
        }).then(() => {
            document.getElementById('incoming-call-overlay').style.display = 'none';
        });
    }
};
        
function listenForMyRequests(uid) {
    database.ref('calls').orderByChild('passengerId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        
        const ui = document.getElementById('passenger-trip-ui');
        const statusText = document.getElementById('pass-trip-status');
        const mapContainer = document.getElementById('map-container');

        if (!calls) {
            if (ui) ui.style.display = 'none';
            return;
        }

        const now = Date.now();
        const tenMinutesAgo = now - (10 * 60 * 1000); // Πολύ πιο αυστηρό φιλτράρισμα

        for (let id in calls) {
            const call = calls[id];

            if (call.timestamp < tenMinutesAgo || call.status === 'completed') {
                if (call.status === 'completed' && ui) ui.style.display = 'none';
                continue; 
            }

            if (!ui || !statusText) continue; 

            if (call.status === 'accepted') {
                ui.style.display = 'block';
                statusText.innerText = `✅ Το ταξί ${call.taxiNumber} έρχεται σε ${call.eta} λεπτά!`;
                
                if (mapContainer) mapContainer.style.display = 'block';
                
                if (call.routeCoords && window.map) {
                    if (window.passengerTripLine) window.map.removeLayer(window.passengerTripLine);
                    window.passengerTripLine = L.polyline(call.routeCoords, {
                        color: '#2980b9', 
                        weight: 5, 
                        dashArray: '10, 10'
                    }).addTo(window.map);
                    
                    window.map.fitBounds(window.passengerTripLine.getBounds(), {padding: [30, 30]});
                }
            }

            else if (call.status === 'arrived') {
                ui.style.display = 'block';
                statusText.innerHTML = `<b style="color: #d35400;">📍 ΤΟ ΤΑΞΙ ΕΦΤΑΣΕ ΕΞΩ!</b>`;
                
                if (mapContainer) mapContainer.style.display = 'none';
            } 
        } 
    }); 
}

window.requestTaxi = function() {

    if (!selectedDriverId) {
        alert("Παρακαλώ επιλέξτε πρώτα ένα ταξί από τον χάρτη!");
        return;
    }

    const passengersElem = document.getElementById('passengers'); 
    const luggageElem = document.getElementById('luggage');  
    
    const passengers = passengersElem ? passengersElem.value : "1";
    const luggage = luggageElem ? luggageElem.checked : false;

    const uid = auth.currentUser.uid;
    const newCallRef = database.ref('calls').push();
    
    console.log("Αποστολή κλήσης στον οδηγό:", selectedDriverId);

    newCallRef.set({
        passengerId: uid,
        targetDriverId: selectedDriverId, 
        status: 'pending',
        passengers: passengers,
        luggage: luggage,
        timestamp: Date.now(),
        lat: window.currentLat || 0,
        lng: window.currentLng || 0
    }).then(() => {
        alert("Η κλήση στάλθηκε! Περιμένετε αποδοχή.");
        const popup = document.getElementById('order-popup');
        if (popup) popup.style.display = 'none';
    }).catch(err => {
        alert("Σφάλμα: " + err.message);
    });
};

        function updateDriverUI(online) {
    const btn = document.getElementById('work-btn');
    const badge = document.getElementById('driver-status-badge');
    const prio = document.getElementById('priority-ui');
    const mapContainer = document.getElementById('driver-map-container');

    if (btn) {
        btn.innerText = online ? "🛑 GO OFFLINE" : "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ";
        btn.className = online ? "btn btn-red" : "btn btn-yellow";
    }
    
    if (badge) {
        badge.innerText = online ? "ONLINE" : "OFFLINE";
        badge.style.background = online ? "#2ecc71" : "#e74c3c";
    }

    if (online) {
        if (prio) prio.style.display = "block";
        if (mapContainer) mapContainer.style.display = "none";
        if (auth.currentUser) watchPriority(auth.currentUser.uid);
    } else {
        if (prio) prio.style.display = "none";
        if (mapContainer) mapContainer.style.display = "none";
        
        if (window.tripLine && window.map) window.map.removeLayer(window.tripLine);
        if (window.paxMarker && window.map) window.map.removeLayer(window.paxMarker);
    }
}

        window.arrivedAtPassenger = function() {
    const cid = window.currentCallId;
    if (!cid) return;
    
    database.ref('calls/' + cid).update({ status: 'arrived' });

    const mapContainer = document.getElementById('map-container');
    if (mapContainer) {
        mapContainer.style.display = "none";
    }

    const actionsDiv = document.getElementById('driver-actions');
    if (actionsDiv) {
        actionsDiv.innerHTML = `
            <div class="card" style="background:#2c3e50; color:white; padding: 20px; border-radius: 12px;">
                <h3 style="margin-top:0;">🚕 Η ΔΙΑΔΡΟΜΗ ΞΕΚΙΝΗΣΕ</h3>
                <p>Ο χάρτης έκλεισε. Πατήστε ολοκλήρωση μόλις φτάσετε στον προορισμό.</p>
                <button class="btn btn-yellow" onclick="completeTrip()" style="width:100%; padding:15px; font-size:18px;">
                    ✅ ΟΛΟΚΛΗΡΩΣΗ ΔΙΑΔΡΟΜΗΣ
                </button>
            </div>`;
    }

    if (window.watchId) {
        navigator.geolocation.clearWatch(window.watchId);
        window.watchId = null;
    }
};
        
window.completeTrip = function() {
    if (!window.currentCallId) return;
    const cid = window.currentCallId;
    const uid = auth.currentUser.uid;

    database.ref('calls/' + cid).update({ 
        status: 'completed',
        completedAt: Date.now()
    }).then(() => {
        window.currentCallId = null;
        
        database.ref('active_drivers').off(); 
        if (window.routeLine) window.map.removeLayer(window.routeLine);
        if (window.paxMarker) window.map.removeLayer(window.paxMarker);

        renderView(uid); 
        
        alert("Η διαδρομή ολοκληρώθηκε! Είστε Offline.");
    });
};
        
        function listenForCalls(uid) {
    database.ref('calls').on('value', snap => {
        const calls = snap.val();
        if (!calls) return;

        const activeCallKey = Object.keys(calls).find(id => 
            calls[id].status === 'pending' && calls[id].targetDriverId === uid
        );

        if (activeCallKey) {
            window.currentCallId = activeCallKey;  
            const call = calls[activeCallKey];

            const details = document.getElementById('call-details');
            if (details) {
                details.innerHTML = `
                    <b>Επιβάτες:</b> ${call.passengers}<br>
                    <b>Αποσκευές:</b> ${call.luggage ? 'ΝΑΙ' : 'ΟΧΙ'}
                `;
            }

            const overlay = document.getElementById('incoming-call-overlay');
            if (overlay && overlay.style.display !== 'flex') {
                overlay.style.display = 'flex';
 
                const beep = document.getElementById('beep-sound');
                if (beep) beep.play().catch(e => console.warn("Ήχος μπλοκαρισμένος από τον browser"));
            }
        } else {
 
            const overlay = document.getElementById('incoming-call-overlay');
            if (overlay) overlay.style.display = 'none';
        }
    });
}

window.showTripOnMap = function() {
    if (!window.currentCallId) return;
    
    const mapCont = document.getElementById('map-container');
    if (mapCont) mapCont.style.display = 'block';
    
    setTimeout(() => {
        if (window.map) {
            window.map.invalidateSize();
            window.drawRouteToPassenger(window.currentCallId);
        }
    }, 500);
};
        
window.drawRouteToPassenger = function(callId) {
    if (!window.map || !window.userMarker) return;

    const statusCard = document.querySelector('.card'); 
    const priorityCard = document.getElementById('priority-list')?.parentElement;
    if (statusCard) statusCard.style.display = 'none';
    if (priorityCard) priorityCard.style.display = 'none';

    database.ref('calls/' + callId).once('value', snap => {
        const call = snap.val();
        if (!call) return;

        const paxLat = call.lat;
        const paxLng = call.lng;
        const driverPos = window.userMarker.getLatLng();

        if (window.paxMarker) window.map.removeLayer(window.paxMarker);
        if (window.routeLine) window.map.removeLayer(window.routeLine);

        window.paxMarker = L.marker([paxLat, paxLng]).addTo(window.map)
            .bindPopup("<b>ΕΠΙΒΑΤΗΣ ΕΔΩ</b>").openPopup();

        const url = `https://router.project-osrm.org/route/v1/driving/${driverPos.lng},${driverPos.lat};${paxLng},${paxLat}?overview=full&geometries=geojson`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.routes && data.routes.length > 0) {
                    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    window.routeLine = L.polyline(coords, { color: '#e67e22', weight: 6 }).addTo(window.map);
                    window.map.fitBounds(window.routeLine.getBounds(), { padding: [50, 50] });
                }
            })
            .catch(err => console.error("OSRM Error:", err));
            
        const actionsDiv = document.getElementById('driver-actions');
        if (actionsDiv) {
            actionsDiv.innerHTML = `
                <button class="btn btn-yellow" onclick="arrivedAtPassenger()" style="width:100%; margin-top:15px; font-size:20px; padding:15px;">
                    🔔 ΕΦΤΑΣΑ ΣΤΟΝ ΕΠΙΒΑΤΗ
                </button>`;
        }
    });
};
        
        function watchPriority(uid) {
    database.ref('active_drivers').on('value', snap => {
        const listDiv = document.getElementById('priority-list');
        if (!listDiv) return;
        const drivers = snap.val() || {};
        
        let sorted = Object.keys(drivers)
            .map(id => ({id, ...drivers[id]}))
            .filter(d => d.taxiNumber)
            .sort((a,b) => a.timestamp - b.timestamp);
            
        listDiv.innerHTML = sorted.map((d, i) => `
            <div style="padding:10px; border-bottom:1px solid #eee; ${d.id === uid ? 'background:#fff9c4; font-weight:bold;' : ''}">
                ${i+1}. Ταξί ${d.taxiNumber}
            </div>
        `).join("") || "Κανένας οδηγός διαθέσιμος";
    });
}

        window.closeOrderPopup = () => document.getElementById('order-popup').style.display = 'none';
       
        function logout() {
    const uid = auth.currentUser.uid;
    database.ref('active_drivers/' + uid).remove().then(() => {
        auth.signOut();
    });
}
