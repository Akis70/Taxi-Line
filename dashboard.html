    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    

    <div id="status-box"></div>

    <div class="status-bar">
        <span>🚕 Taxi-Line</span>
        <div style="display: flex; align-items: center;">

        <p>Taxi-Line &copy; 2026 | All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e",
            storageBucket: "taxi-line-f149e.firebasestorage.app",
            messagingSenderId: "1086896421565",
            appId: "1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map, userMarker, myData = null;
        let isOnline = false;
        let currentCallId = null;
        let driverMarkers = {};
        let selectedDriverId = null;

        // --- AUTH & INITIALIZATION ---
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = "index.html"; return; }
            database.ref('users/' + user.uid).once('value', snap => {
                myData = snap.val();
                document.getElementById('user-tag').innerText = myData.email;
                renderView(user.uid);
            });
        });

window.toggleWorkStatus = function() {
    const uid = auth.currentUser.uid;
    
    if (!isOnline) {
        if (!userMarker) { 
            alert("Περιμένετε 2-3 δευτερόλεπτα να εντοπιστεί το στίγμα σας!"); 
            return; 
        }

        const taxiNum = (myData && myData.taxiNumber) ? myData.taxiNumber : "---";
        if (taxiNum === "---") {
            alert("Σφάλμα: Δεν βρέθηκε ο αριθμός ταξί στο προφίλ σας.");
            return;
        }
        
        isOnline = true;
        updateDriverUI(true);

        database.ref('active_drivers/' + uid).set({
            lat: userMarker.getLatLng().lat,
            lng: userMarker.getLatLng().lng,
            taxiNumber: taxiNum,
            timestamp: Date.now()
        }).then(() => {
            database.ref('active_drivers/' + uid).onDisconnect().remove();
        });

    } else {
        isOnline = false;
        updateDriverUI(false); 
        
        // Ακύρωση του onDisconnect πρώτα
        database.ref('active_drivers/' + uid).onDisconnect().cancel();
        
        // Καθαρή αφαίρεση
        database.ref('active_drivers/' + uid).remove()
            .then(() => { console.log("Driver went offline successfully."); })
            .catch((error) => { console.error("Error going offline:", error); });
    }
};
        
function updateDriverUI(online) {
    const btn = document.getElementById('work-btn');
    const badge = document.getElementById('driver-status-badge');
    const prio = document.getElementById('priority-ui');
    
    if (online) {
        if (btn) { btn.innerText = "🛑 GO OFFLINE"; btn.className = "btn btn-red"; }
        if (badge) { badge.innerText = "ONLINE"; badge.style.backgroundColor = "#2ecc71"; }
        if (prio) prio.style.display = "block";
    } else {
        if (btn) { btn.innerText = "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ"; btn.className = "btn btn-yellow"; }
        if (badge) { badge.innerText = "OFFLINE"; badge.style.backgroundColor = "#e74c3c"; }
        if (prio) prio.style.display = "none";
        // Κλείνουμε τον χάρτη οδηγού αν βγει offline
        const mapContainer = document.getElementById('driver-map-container');
        if (mapContainer) mapContainer.style.display = "none";
    }
}
                         
        function renderView(uid) {
    const container = document.getElementById("main-container");
    
    if (myData.role === 'driver') {
        // --- UI ΟΔΗΓΟΥ ---
        database.ref('active_drivers/' + auth.currentUser.uid).remove();
        isOnline = false;

        container.innerHTML = `
    <div class="card">
        <h2>🚕 Ταξί: ${myData.taxiNumber}</h2>
        <div id="driver-status-badge" style="background:#e74c3c; color:white; display:inline-block; padding:5px 15px; border-radius:20px; font-weight:bold; margin-bottom:10px;">OFFLINE</div>
        <button id="work-btn" class="btn btn-yellow" onclick="toggleWorkStatus()">🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ</button>
    </div>

    <div id="driver-map-container" style="display:none;">
        <div class="card">
            <div id="map" style="height:350px; border-radius:8px;"></div>
            <div id="driver-actions" style="margin-top:10px;"></div> 
        </div>
    </div>

    <div id="priority-ui" class="card" style="display:none;">
        <h3>📋 Λίστα Προτεραιότητας</h3>
        <div id="priority-list"></div>
    </div>

    <button class="logout-btn-footer" onclick="logout()">Αποσύνδεση</button>

    <div id="incoming-call-overlay" class="overlay" style="display:none; background: rgba(0,0,0,0.9); z-index: 10000;">
        <div class="card" style="text-align:center; border: 2px solid #f1c40f;">
            <h2 style="color:#f1c40f;">🚕 ΝΕΑ ΚΛΗΣΗ!</h2>
            <div id="call-details" style="background: #333; padding: 15px; border-radius: 8px; margin: 15px 0;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-yellow" onclick="acceptCall()" style="flex:1; font-size:1.2em;">ΑΠΟΔΟΧΗ</button>
                <button class="btn" onclick="rejectCall()" style="flex:1; background:#e74c3c; color:white;">ΑΠΟΡΡΙΨΗ</button>
            </div>
        </div>
    </div>
`;
    } else {
        // --- UI ΕΠΙΒΑΤΗ ---
        container.innerHTML = `
            <div class="card" style="padding:10px;">
                <h3>📍 Επιλέξτε Ταξί κοντά σας </h3>
                <div id="map" style="height: 400px; border-radius: 8px;"></div>
            </div>
            
            <div id="status-box" class="card" style="display:none; border:2px solid #f1c40f; position: fixed; bottom: 80px; left: 10px; right: 10px; z-index: 9999;">
                <h3 id="pass-trip-status">Αναμονή...</h3>
            </div>

            <div class="card">
                <a href="tel:6999222446" class="btn btn-yellow" style="text-decoration: none;">📞 Ή Καλέστε ένα Ταξί</a>
            </div>

            <button class="logout-btn-footer" onclick="logout()">Αποσύνδεση</button>
            
            <div id="order-popup" class="overlay" style="display:none;">
                <div class="card" style="width:280px;">
                    <h3>Κράτηση Ταξί</h3>
                    <label>Άτομα: <input type="number" id="pax" value="1" min="1" max="4"></label><br><br>
                    <label><input type="checkbox" id="luggage"> Έχω αποσκευές</label><br><br>
                    <button class="btn btn-yellow" onclick="confirmOrder()">ΚΛΗΣΗ ΤΩΡΑ</button>
                    <button class="btn" onclick="closeOrderPopup()">Ακύρωση</button>
                </div>
            </div>
        `;
    }

    setTimeout(() => initMap(uid), 300);

    if (myData.role === 'driver') { 
        watchPriority(uid); 
        listenForCalls(uid); 
    } else { 
        listenForResponse(uid); 
    }
}

        function initMap(uid) {
            map = L.map('map').setView([40.5215, 21.2634], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (!userMarker) {
                    userMarker = L.marker([lat, lng]).addTo(map).bindPopup("Εσείς");
                    map.setView([lat, lng], 15);
                } else { userMarker.setLatLng([lat, lng]); }

                if (isOnline && myData.role === 'driver') {
                    database.ref('active_drivers/' + uid).update({ lat, lng, timestamp: Date.now() });
                }
            }, null, { enableHighAccuracy: true });

            if (myData.role === 'passenger') watchDriversForPassenger();
        }

        function watchDriversForPassenger() {
    database.ref('active_drivers').on('value', snap => {
        const drivers = snap.val() || {};

        map.eachLayer(layer => {
            if (layer instanceof L.Marker && layer !== userMarker) {
                map.removeLayer(layer);
            }
        });

        driverMarkers = {}; 

        const myPos = userMarker ? userMarker.getLatLng() : {lat: 40.5215, lng: 21.2634};

        for (let id in drivers) {
            const d = drivers[id];
            
            // --- ΕΛΕΓΧΟΣ ΓΙΑ ΦΑΝΤΑΣΜΑΤΑ ---
            // Αν λείπουν συντεταγμένες ή το νούμερο είναι "---", το αγνοούμε
            if (!d.lat || !d.lng || !d.taxiNumber || d.taxiNumber === "---") {
                continue; 
            }

            const dist = map.distance([myPos.lat, myPos.lng], [d.lat, d.lng]);
            
            if (dist < 5000) { 
                const taxiIcon = L.divIcon({
                    html: `
                        <div class="custom-taxi-icon">
                            <span class="taxi-plate-label">${d.taxiNumber}</span>
                            <span class="taxi-emoji">🚕</span>
                        </div>`,
                    className: '', 
                    iconSize: [60, 60], 
                    iconAnchor: [30, 50] 
                });

                const marker = L.marker([d.lat, d.lng], { icon: taxiIcon }).addTo(map);
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e); 
                    selectedDriverId = id;
                    document.getElementById('order-popup').style.display = 'flex';
                });

                driverMarkers[id] = marker;
            }
        }
    });
}
        
        window.confirmOrder = function() {
    const pax = document.getElementById('pax').value;
    const lug = document.getElementById('luggage').checked;
    const uid = auth.currentUser.uid;
    
    if (!selectedDriverId) {
        alert("Παρακαλώ επιλέξτε ταξί!");
        return;
    }

    const newCallRef = database.ref('calls').push();
    newCallRef.set({
        passengerId: uid,
        targetDriverId: selectedDriverId,
        passengers: pax,
        luggage: lug ? "ΝΑΙ" : "ΟΧΙ",
        status: 'pending',
        lat: userMarker.getLatLng().lat,
        lng: userMarker.getLatLng().lng,
        timestamp: Date.now()
    }).then(() => {
        closeOrderPopup();
        const s = document.getElementById('status-box');
        s.style.display = 'block';
        s.style.background = '#f1c40f';
        s.innerHTML = "⏳ Η κλήση στάλθηκε! Περιμένετε αποδοχή...";
        
        listenForResponse(uid);
    }).catch(err => alert("Σφάλμα: " + err.message));
};

window.listenForResponse = function(uid) {
 
    const halfHourAgo = Date.now() - (30 * 60 * 1000);

    database.ref('calls').orderByChild('passengerId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        const s = document.getElementById('status-box');
        
        if (!s) return;

        if (!calls) { 
            s.style.display = 'none'; 
            if (window.passengerTripLine) map.removeLayer(window.passengerTripLine);
            return; 
        }

        for (let id in calls) {
            const c = calls[id];

            if (c.timestamp < halfHourAgo) continue;

            if (c.status === "pending") {
                s.style.display = 'block';
                s.style.background = '#f1c40f';
                s.style.color = 'black';
                s.innerHTML = `<h3>⏳ Αναμονή αποδοχής...</h3><p>Το αίτημα στάλθηκε στον οδηγό.</p>`;
            } 
            else if (c.status === "accepted") {
                s.style.display = 'block';
                s.style.background = '#27ae60';
                s.style.color = 'white';
                s.innerHTML = `<h3>✅ Έρχεται!</h3><p>Το ταξί <b>${c.taxiNumber || ''}</b> αποδέχτηκε την κλήση και θα είναι εκεί σε ${c.eta || '?'} λεπτά.</p>`;
                
            } 
            else if (c.status === "arrived") {
                s.style.display = 'block';
                s.style.background = '#3498db';
                s.style.color = 'white';
                s.innerHTML = `<h3>🚕 Έφτασε!</h3><p>Ο οδηγός είναι στο σημείο.</p><button onclick="confirmArrival('${id}')" style="background:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">ΕΠΙΒΙΒΑΣΗ</button>`;
            }
            else if (c.status === "rejected") {
                s.style.display = 'block';
                s.style.background = '#e74c3c';
                s.style.color = 'white';
                s.innerHTML = `<h3>❌ Απορρίφθηκε</h3><p>Ο οδηγός δεν μπορεί να εξυπηρετήσει αυτή τη στιγμή.</p>`;
                setTimeout(() => { s.style.display = 'none'; }, 5000);
            }
        }
    });
};
        
window.acceptCall = function() {
    const minutes = prompt("Σε πόσα λεπτά θα είστε εκεί;", "5");
    
    if (minutes === null) return; 

    if (window.currentCallId) {
        database.ref('calls/' + window.currentCallId).update({
            status: 'accepted',
            eta: minutes, 
            taxiNumber: myData.taxiNumber || "---", 
            driverId: auth.currentUser.uid
        }).then(() => {
            
            const overlay = document.getElementById('incoming-call-overlay');
            if (overlay) overlay.style.display = 'none';
            document.getElementById('priority-ui').style.display = 'none'; // Κρύβει τη λίστα
            document.getElementById('driver-map-container').style.display = 'block'; // Δείχνει τον χάρτη
            if (window.map) window.map.invalidateSize(); // Διορθώνει το μέγεθος του χάρτη

window.showTripOnMap = function() {
    if (!window.currentCallId) return;

    database.ref('calls/' + window.currentCallId).once('value', snap => {
        const call = snap.val();
        if (!call) return;

        if (window.tripLine) map.removeLayer(window.tripLine);
        if (window.paxMarker) map.removeLayer(window.paxMarker);

        window.paxMarker = L.marker([call.lat, call.lng]).addTo(map).bindPopup("ΕΠΙΒΑΤΗΣ").openPopup();

        const start = userMarker.getLatLng();
        const end = { lat: call.lat, lng: call.lng };

        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`)
            .then(response => response.json())
            .then(data => {
                if (!data.routes || data.routes.length === 0) return;
                
                const coordinates = data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                
                window.tripLine = L.polyline(coordinates, { color: '#2980b9', weight: 6, opacity: 0.7 }).addTo(map);
                map.fitBounds(window.tripLine.getBounds(), { padding: [50, 50] });
                
                database.ref('calls/' + window.currentCallId).update({ routeCoords: coordinates });
            });

        const actions = document.getElementById('driver-actions');
        if (actions) {
            actions.innerHTML = `<button class="btn btn-yellow" onclick="arrivedAtPassenger()" style="width:100%; margin-top:10px; font-weight:bold;">🔔 ΕΦΤΑΣΑ ΣΤΟΝ ΕΠΙΒΑΤΗ</button>`;
        }
    });
};
window.rejectCall = function() {
    if (window.currentCallId) {
        database.ref('calls/' + window.currentCallId).update({
            status: 'rejected'
        }).then(() => {
            document.getElementById('incoming-call-overlay').style.display = 'none';
        });
    }
};
        
function listenForMyRequests(uid) {
    database.ref('calls').orderByChild('passengerId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        if (!calls) return;

        const now = Date.now();
        const halfHour = 30 * 60 * 1000; // 30 λεπτά σε milliseconds

        for (let id in calls) {
            const call = calls[id];
            
            // 1. Αγνόησε παλιές κλήσεις (άνω των 30 λεπτών)
            if (now - call.timestamp > halfHour) continue;

            const ui = document.getElementById('passenger-trip-ui');
            const statusText = document.getElementById('pass-trip-status');
            
            if (!ui || !statusText) continue; // Σιγουριά ότι υπάρχουν τα στοιχεία στο HTML

            // 2. Έλεγχος Status
            if (call.status === 'accepted') {
                ui.style.display = 'block';
                const minutes = call.time || "?"; 
                statusText.innerText = `✅ Το ταξί έρχεται σε ${minutes} λεπτά!`;
            } 
            else if (call.status === 'arrived') {
                ui.style.display = 'block';
                statusText.innerText = `📍 Το ταξί ΕΦΤΑΣΕ έξω!`;
                const mapElem = document.getElementById('map');
                if (mapElem) mapElem.parentElement.style.display = 'none';
            } 
            else if (call.status === 'completed') {
                ui.style.display = 'none';
                const mapElem = document.getElementById('map');
                if (mapElem) mapElem.parentElement.style.display = 'block';
            }
        } // Εδώ κλείνει το for
    }); // Εδώ κλείνει το callback
}

window.drawRouteToPassenger = function(callId) {
    database.ref('calls/' + callId).once('value', snap => {
        const call = snap.val();
        if (!call) return;

        const passengerLatLng = [call.lat, call.lng];
        
        // 1. Προσθήκη Marker Επιβάτη στον χάρτη του οδηγού
        if (window.passengerMarker) map.removeLayer(window.passengerMarker);
        window.passengerMarker = L.marker(passengerLatLng).addTo(map)
            .bindPopup("Ο ΠΕΛΑΤΗΣ ΕΙΝΑΙ ΕΔΩ").openPopup();

        // 2. Σχεδιασμός απλής γραμμής (ή routing αν έχεις API key)
        const driverLatLng = [userMarker.getLatLng().lat, userMarker.getLatLng().lng];
        
        if (window.routeLine) map.removeLayer(window.routeLine);
        window.routeLine = L.polyline([driverLatLng, passengerLatLng], {
            color: 'blue',
            weight: 4,
            dashArray: '10, 10'
        }).addTo(map);

        map.fitBounds(window.routeLine.getBounds(), {padding: [50, 50]});
    });
};

        function updateDriverUI(online) {
            const btn = document.getElementById('work-btn');
            const badge = document.getElementById('driver-status-badge');
            const prio = document.getElementById('priority-ui');
            btn.innerText = online ? "🛑 GO OFFLINE" : "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ";
            btn.className = online ? "btn btn-red" : "btn btn-yellow";
            badge.innerText = online ? "ONLINE" : "OFFLINE";
            badge.style.background = online ? "#2ecc71" : "#e74c3c";
            prio.style.display = online ? "block" : "none";
        }

        window.markAsArrived = function() {
            database.ref('calls/' + window.currentCallId).update({ status: 'arrived' })
            .then(() => {
                document.getElementById('driver-map-container').style.display = 'none';
                document.getElementById('trip-info').innerHTML = "📍 Είστε στο σημείο!";
                const btn = document.querySelector('#active-trip-ui button');
                btn.innerText = "ΟΛΟΚΛΗΡΩΣΗ";
                btn.onclick = window.completeTrip;
            });
        };

        window.completeTrip = function() {
    if (!window.currentCallId) return;

    database.ref('calls/' + window.currentCallId).update({ 
        status: 'completed',
        completedAt: Date.now() 
    }).then(() => {
        // Καθαρισμός μεταβλητών
        window.currentCallId = null;
        isOnline = false;

        // Επαναφορά UI
        document.getElementById('driver-map-container').style.display = 'none';
        document.getElementById('priority-ui').style.display = 'block';
        
        // Καθαρισμός χάρτη
        if (window.tripLine) map.removeLayer(window.tripLine);
        if (window.paxMarker) map.removeLayer(window.paxMarker);

        const workBtn = document.getElementById('work-btn');
        if (workBtn) {
            workBtn.innerText = "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ";
            workBtn.className = "btn btn-yellow";
        }

        alert("Η διαδρομή ολοκληρώθηκε με επιτυχία!");
    }).catch(err => alert("Σφάλμα: " + err.message));
};

        function listenForCalls(uid) {
    database.ref('calls').orderByChild('targetDriverId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        
        // Αν δεν υπάρχουν κλήσεις ή ο κόμβος άδειασε, κλείνουμε το overlay
        if (!calls) {
            const overlay = document.getElementById('incoming-call-overlay');
            if (overlay) overlay.style.display = 'none';
            return;
        }
        
        for (let id in calls) {
            if (calls[id].status === 'pending') {
                window.currentCallId = id; 
                
                const details = document.getElementById('call-details');
                const overlay = document.getElementById('incoming-call-overlay');

                if (details) {
                    details.innerHTML = `
                        <div style="color:white; margin-bottom:10px; font-size: 1.2em;">
                            <strong>👥 Επιβάτες:</strong> ${calls[id].passengers}<br>
                            <strong>🧳 Αποσκευές:</strong> ${calls[id].luggage}
                        </div>
                    `;
                }

                // ΕΛΕΓΧΟΣ: Παίξε ήχο και δείξε το overlay ΜΟΝΟ αν δεν είναι ήδη ανοιχτό
                if (overlay && overlay.style.display !== 'flex') {
                    overlay.style.display = 'flex';
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play()
                        .catch(e => console.log("Audio play deferred until user interaction"));
                }
            } else {
                // Αν η κλήση που βλέπουμε δεν είναι πια "pending" (π.χ. ακυρώθηκε), κλείνουμε το overlay
                const overlay = document.getElementById('incoming-call-overlay');
                if (overlay) overlay.style.display = 'none';
            }
        }
    });
}

        function watchPriority(uid) {
            database.ref('active_drivers').on('value', snap => {
                const listDiv = document.getElementById('priority-list');
                if (!listDiv) return;
                const drivers = snap.val() || {};
                let sorted = Object.keys(drivers).map(id => ({id, ...drivers[id]})).sort((a,b) => a.timestamp - b.timestamp);
                listDiv.innerHTML = sorted.map((d, i) => `<div style="padding:10px; border-bottom:1px solid #eee; ${d.id === uid ? 'background:#fff9c4; font-weight:bold;' : ''}">${i+1}. Ταξί ${d.taxiNumber}</div>`).join("") || "Κανένας οδηγός";
            });
        }

        window.closeOrderPopup = () => document.getElementById('order-popup').style.display = 'none';
       
        function logout() {
    const uid = auth.currentUser.uid;
    database.ref('active_drivers/' + uid).remove().then(() => {
        auth.signOut();
    });
}
