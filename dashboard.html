<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taxi-Line Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

:root{
--yellow:#f1c40f;
--dark:#2c3e50;
--bg:#f4f4f4;
}

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
}

.status-bar{
background:var(--dark);
color:#fff;
padding:10px 20px;
display:flex;
justify-content:space-between;
}

.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
text-align:center;
}

#map{height:420px;border-radius:10px}

.btn{
padding:14px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
width:90%;
max-width:300px;
margin:10px auto;
display:block;
}

.yellow{background:var(--yellow)}
.red{background:#e74c3c;color:#fff}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
box-shadow:0 -4px 10px rgba(0,0,0,.1);
text-align:center;
}

#incoming{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
color:#fff;
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

#status-box{
display:none;
position:fixed;
bottom:120px;
left:5%;
width:90%;
background:#27ae60;
color:#fff;
padding:15px;
border-radius:12px;
text-align:center;
}

</style>
</head>

<body>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="incoming">
<h2>🔔 Νέα κλήση</h2>
<div id="call-details"></div>
<button class="btn yellow" onclick="acceptCall()">ΑΠΟΔΟΧΗ</button>
<button class="btn red" onclick="rejectCall()">ΑΠΟΡΡΙΨΗ</button>
</div>

<div id="status-box"></div>

<div class="status-bar">
<span>🚕 Taxi-Line</span>
<span id="user-tag"></span>
</div>

<div id="main-content">
<div class="card">🔄 Φόρτωση...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
authDomain:"taxi-line-f149e.firebaseapp.com",
databaseURL:"https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"taxi-line-f149e"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let map,userMarker;
let driverMarkers={};

let myData=null;
let isOnline=false;
let currentCall=null;

let tripLine=null;
let passengerMarker=null;
let myDriverMarker=null;

function distanceKm(a,b,c,d){

const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;

const x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));

}

auth.onAuthStateChanged(user=>{

if(!user){
location="index.html";
return;
}

db.ref("users/"+user.uid).once("value").then(s=>{

myData=s.val() || {email:user.email,role:"passenger"};

db.ref("users/"+user.uid).set(myData);

document.getElementById("user-tag").innerText=myData.email;

renderView(user.uid);

});

});

function renderView(uid){

const box=document.getElementById("main-content");

if(myData.role==="driver"){

box.innerHTML=`

<div id="waiting" class="card">

<h2>📋 Σειρά</h2>

<div id="priority-list">...</div>

<button id="work-btn" class="btn yellow"
onclick="toggleWork('${uid}')">GO ONLINE</button>

<button onclick="auth.signOut()">Έξοδος</button>

</div>

<div id="map-box" style="display:none">

<div class="card">
<div id="map"></div>
<div id="driver-actions"></div>
</div>

</div>
`;

watchPriority();
listenForCalls(uid);
initMap();

}

else{

box.innerHTML=`

<div class="card">

<h3>🚕 Ταξί κοντά σας</h3>

<div id="map"></div>

</div>

<div class="footer">

<a href="quick-call.html" class="btn yellow">
📞 Κλήση ταξί
</a>

<button onclick="auth.signOut()">Αποσύνδεση</button>

</div>
`;

initMap();
watchDrivers();
listenForResponse(uid);

}

}

function initMap(){

setTimeout(()=>{

if(map) map.remove();

map=L.map("map").setView([38.52,21.28],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

userMarker=L.circleMarker(
[38.52,21.28],
{radius:10,color:"#2980b9",fillColor:"#3498db",fillOpacity:.9}
).addTo(map);

map.locate({setView:true,maxZoom:16,watch:true});

map.on("locationfound",e=>{

userMarker.setLatLng(e.latlng);

if(isOnline){

db.ref("active_drivers/"+auth.currentUser.uid).update({
lat:e.latlng.lat,
lng:e.latlng.lng
});

}

});

map.on("locationerror",()=>{

alert("Ενεργοποιήστε GPS");

});

},300);

}

function toggleWork(uid){

const btn=document.getElementById("work-btn");

isOnline=!isOnline;

if(isOnline){

btn.innerText="GO OFFLINE";
btn.className="btn red";

db.ref("active_drivers/"+uid).set({
lat:userMarker.getLatLng().lat,
lng:userMarker.getLatLng().lng,
taxiNumber:myData.taxiNumber,
timestamp:Date.now()
});

}

else{

btn.innerText="GO ONLINE";
btn.className="btn yellow";

db.ref("active_drivers/"+uid).remove();

}

}

function watchPriority(){

db.ref("active_drivers").on("value",s=>{

const list=document.getElementById("priority-list");

if(!list) return;

const d=s.val();

if(!d){
list.innerHTML="Κανένας οδηγός";
return;
}

let sorted=Object.keys(d)
.map(i=>({id:i,...d[i]}))
.sort((a,b)=>a.timestamp-b.timestamp);

list.innerHTML=sorted.map((x,i)=>
`<div>${i+1}. Taxi ${x.taxiNumber}</div>`
).join("");

});

}

function watchDrivers(){

db.ref("active_drivers").on("value",s=>{

const drivers=s.val();

if(!drivers || !userMarker) return;

const pos=userMarker.getLatLng();

for(let id in drivers){

const d=drivers[id];

const dist=distanceKm(pos.lat,pos.lng,d.lat,d.lng);

if(dist>5) continue;

if(!driverMarkers[id]){

driverMarkers[id]=L.marker([d.lat,d.lng])
.addTo(map)
.bindPopup(`<b>Taxi ${d.taxiNumber}</b><br>${dist.toFixed(1)} km`);

}

else{

driverMarkers[id].setLatLng([d.lat,d.lng]);

}

}

});

}

function callTaxi(driverId,taxiNumber){

if(!userMarker) return;

const pos=userMarker.getLatLng();

db.ref("calls").push({

driverId,
passengerId:auth.currentUser.uid,
taxiNumber,
status:"pending",
pLat:pos.lat,
pLng:pos.lng,
timestamp:Date.now()

});

alert("Κλήση στο Taxi "+taxiNumber);

}

function listenForCalls(driverId){

db.ref("calls")
.orderByChild("driverId")
.equalTo(driverId)
.on("value",s=>{

const calls=s.val();

if(!calls) return;

for(let id in calls){

if(calls[id].status==="pending"){

currentCall=id;

document.getElementById("incoming").style.display="flex";

document.getElementById("call-details").innerText=
"👥 Επιβάτες: "+(calls[id].passengers||1);

const audio=document.getElementById("beep");

audio.loop=true;
audio.play().catch(()=>{});

}

}

});

}

function acceptCall(){

db.ref("calls/"+currentCall).update({
status:"accepted",
driverId:auth.currentUser.uid
});

document.getElementById("incoming").style.display="none";

const audio=document.getElementById("beep");

audio.pause();
audio.currentTime=0;

}

function rejectCall(){

db.ref("calls/"+currentCall).update({status:"rejected"});

document.getElementById("incoming").style.display="none";

}

function listenForResponse(uid){

db.ref("calls")
.orderByChild("passengerId")
.equalTo(uid)
.on("value",s=>{

const calls=s.val();

const box=document.getElementById("status-box");

if(!calls){
box.style.display="none";
return;
}

for(let id in calls){

const c=calls[id];

if(c.status==="accepted"){

box.style.display="block";

box.innerHTML=
`🚕 Taxi ${c.taxiNumber||""} έρχεται`;

watchDriverLocation(c.driverId);

}

if(c.status==="completed"){

box.style.display="none";

if(myDriverMarker){
map.removeLayer(myDriverMarker);
myDriverMarker=null;
}

}

}

});

}

function watchDriverLocation(driverId){

db.ref("active_drivers/"+driverId)
.on("value",s=>{

const d=s.val();

if(!d) return;

if(!myDriverMarker){

myDriverMarker=L.marker([d.lat,d.lng])
.addTo(map);

}

else{

myDriverMarker.setLatLng([d.lat,d.lng]);

}

});

}

</script>

</body>
</html>
