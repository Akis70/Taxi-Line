    function checkAutoNightMode() {
    const hour = new Date().getHours();
    // Θεωρούμε νύχτα από τις 20:00 (8 μ.μ.) έως τις 07:00 το πρωί
    const isNight = (hour >= 20 || hour < 7);
    
    // Αν είναι νύχτα και το night mode ΔΕΝ είναι ήδη ενεργό, ενεργοποίησέ το
    // Αν είναι μέρα και το night mode ΕΙΝΑΙ ενεργό, απενεργοποίησέ το
    if (isNight && !document.body.classList.contains('night-mode')) {
        toggleNightMode();
        console.log("Αυτόματη ενεργοποίηση Night Mode");
    } else if (!isNight && document.body.classList.contains('night-mode')) {
        toggleNightMode();
        console.log("Αυτόματη απενεργοποίηση Night Mode (Πρωί)");
    }
}   
        
    function watchDrivers() {
    console.log("Ξεκίνησε η παρακολούθηση οδηγών...");
    
    database.ref('active_drivers').on('value', snap => {
        const drivers = snap.val() || {};
        const now = Date.now();

        // 1. ΚΑΘΑΡΙΣΜΟΣ
        for (let id in driverMarkers) {
            const lastActive = drivers[id] ? drivers[id].lastSeen : 0;
            if (!drivers[id] || (now - lastActive > 120000)) {
                if (map) map.removeLayer(driverMarkers[id]);
                delete driverMarkers[id];
            }
        }

        // 2. ΕΝΗΜΕΡΩΣΗ / ΔΗΜΙΟΥΡΓΙΑ
        for (let id in drivers) {
            const d = drivers[id];
            if (now - (d.lastSeen || 0) > 120000) continue;

let displayPlate = d.taxiNumber || "TAXI";

            if (!driverMarkers[id]) {
                // ΔΗΜΙΟΥΡΓΙΑ ΝΕΟΥ MARKER
                driverMarkers[id] = L.marker([d.lat, d.lng], {
                    icon: L.divIcon({ 
                        html: '<div style="position: relative; display: flex; flex-direction: column; align-items: center;"><div style="background: #000; color: #f1c40f; font-weight: bold; font-size: 11px; padding: 1px 4px; border: 1px solid #f1c40f; border-radius: 3px; position: absolute; top: -10px; white-space: nowrap; z-index: 10; box-shadow: 0px 2px 4px rgba(0,0,0,0.5);">' + displayPlate + '</div><div style="font-size: 32px; line-height: 1;">🚕</div></div>', 
                        className: 'custom-icon', 
                        iconSize: [40, 40], 
                        iconAnchor: [20, 20]
                    })
                }).addTo(map).bindPopup('<div style="text-align:center; font-family: sans-serif; min-width:180px; padding:5px;"><b style="font-size:16px;">Taxi: ' + displayPlate + '</b><hr><div style="margin:10px 0; text-align:left; font-size:13px;"><label style="display:block; margin-bottom:3px;">Epivates:</label><select id="pax_' + id + '" style="width:100%; margin-bottom:10px; padding:4px;"><option value="1">1 atomo</option><option value="2">2 atoma</option><option value="3">3 atoma</option><option value="4">4 atoma</option></select><label style="display:flex; align-items:center; gap:8px; cursor:pointer; background:#f9f9f9; padding:5px;"><input type="checkbox" id="lug_' + id + '"> Me aposkeyes</label></div><button onclick="window.handleBooking(\'' + id + '\', \'' + displayPlate + '\')" class="btn btn-yellow" style="width:100%; margin-top:10px; font-weight:bold;">KLISI TAXI</button></div>', {
                    autoPan: false,
                    keepInView: true,
                    closeButton: true,
                    minWidth: 200
                });
            } else {
                // ΕΝΗΜΕΡΩΣΗ ΘΕΣΗΣ ΥΠΑΡΧΟΝΤΟΣ MARKER
                driverMarkers[id].setLatLng([d.lat, d.lng]); 
            }
        }
    }); 
}
        let mapCentered = false; 
        
function initMap(role, uid) {
    const mapDiv = document.getElementById('map');
    
    // 1. Βασικοί έλεγχοι
    if (!mapDiv) {
        console.warn("Το div με id='map' δεν βρέθηκε ακόμα στο DOM.");
        return;
    }
    if (map) {
        // Αν ο χάρτης υπάρχει ήδη, απλά κάνουμε ένα resize για να στρώσει το UI
        setTimeout(() => map.invalidateSize(), 400);
        return;
    }

    console.log("Αρχικοποίηση χάρτη για:", role);

    // 2. Δημιουργία Χάρτη (Default κεντράρισμα στην Καστοριά)
    map = L.map('map').setView([40.5215, 21.2634], 14);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3. Ενεργοποίηση Geolocation
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;

            // Ενημέρωση ή δημιουργία του Marker του χρήστη
            if (!userMarker) {
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("Είσαι εδώ");
                console.log("Το στίγμα εντοπίστηκε επιτυχώς!");
            } else {
                userMarker.setLatLng([lat, lng]);
            }

            // Κεντράρισμα του χάρτη μόνο την πρώτη φορά που βρίσκει στίγμα
            if (typeof mapCentered === 'undefined' || !mapCentered) {
                map.setView([lat, lng], 16);
                window.mapCentered = true; // Χρησιμοποιούμε window για να είναι σίγουρα global
            }

            // 4. Ενημέρωση Firebase ΜΟΝΟ αν είναι οδηγός ΚΑΙ είναι Online
            // Χρησιμοποιούμε τη μεταβλητή isOnline που αλλάζει από το κουμπί
            if (role === 'driver' && isOnline) {
                const driverRef = database.ref('active_drivers/' + uid);
                driverRef.update({ 
                    lat: lat, 
                    lng: lng, 
                    lastSeen: Date.now(),
                    taxiNumber: (myData && myData.taxiNumber) ? myData.taxiNumber : "---"
                }).catch(err => console.error("Firebase Update Error:", err));
            }
        }, 
        err => {
            console.warn("Geolocation Warning:", err.message);
            // Αν ο χρήστης αρνηθεί το GPS, ενημερώνουμε την κονσόλα
            if(err.code === 1) alert("Παρακαλούμε επιτρέψτε την πρόσβαση στην τοποθεσία για να λειτουργήσει η εφαρμογή.");
        }, 
        { 
            enableHighAccuracy: true, // Πάντα true για οδηγούς ταξί
            timeout: 10000, 
            maximumAge: 0 
        });
    } else {
        alert("Ο browser σας δεν υποστηρίζει Geolocation.");
    }

    // 5. Fix για γκρι χάρτη (invalidateSize)
    setTimeout(() => {
        if (map) {
            map.invalidateSize();
            console.log("Map resized successfully");
        }
    }, 600);

    // 6. Αν είναι επιβάτης, ενεργοποιούμε την παρακολούθηση άλλων οδηγών
    if (role === 'passenger' && typeof watchDrivers === "function") {
        watchDrivers(); 
    }
}

function toggleWorkStatus() {
    const uid = auth.currentUser ? auth.currentUser.uid : null;
    if (!uid) return;

    const btn = document.getElementById('work-btn');
    const badge = document.getElementById('driver-status-badge');
    const priorityUI = document.getElementById('priority-ui');
    const mapContainer = document.getElementById('driver-map-container');

    if (!isOnline) {
        // --- GO ONLINE ---
        if (!userMarker) {
            alert("Περιμένετε 2-3 δευτερόλεπτα να εντοπιστεί η θέση σας!");
            return;
        }
        isOnline = true;
        btn.innerText = "🛑 GO OFFLINE";
        btn.className = "btn btn-red";
        
        if (badge) {
            badge.innerText = "ONLINE";
            badge.style.setProperty("background-color", "#2ecc71", "important");
        }

        // Εμφάνιση ΜΟΝΟ της λίστας
        if (priorityUI) priorityUI.style.display = "block";
        
        // ΕΠΙΒΟΛΗ ΑΠΟΚΡΥΨΗΣ ΧΑΡΤΗ
        if (mapContainer) {
            mapContainer.style.setProperty("display", "none", "important");
        }

        goOnline(uid);
    } else {
        // --- GO OFFLINE ---
        isOnline = false;
        btn.innerText = "🚀 ΕΝΑΡΞΗ ΒΑΡΔΙΑΣ";
        btn.className = "btn btn-yellow";
        
        if (badge) {
            badge.innerText = "OFFLINE";
            badge.style.setProperty("background-color", "#e74c3c", "important");
        }

        if (priorityUI) priorityUI.style.display = "none";
        if (mapContainer) mapContainer.style.display = "none";
        
        goOffline(uid);
    }
}
        
function watchPriority(uid) {
    database.ref('active_drivers').on('value', snap => {
        const listDiv = document.getElementById('priority-list');
        if (!listDiv) return;
        
        const drivers = snap.val();
        if (!drivers) { 
            listDiv.innerHTML = "Κανένας οδηγός online"; 
            return; 
        }
        
        // 1. Μετατροπή σε πίνακα και ταξινόμηση
        let sorted = Object.keys(drivers).map(id => {
            return { id: id, ...drivers[id] };
        }).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
        let html = "";
        
        for (let i = 0; i < sorted.length; i++) {
            const d = sorted[i];
            const isMe = (d.id === uid);
            
            // Φτιάχνουμε το στυλ ξεχωριστά
            let style = "padding:12px; border-bottom:1px solid #eee; text-align:left; font-size:18px;";
            if (isMe) {
                style += "background:rgba(241, 196, 15, 0.13); font-weight:bold; border:1px solid #f1c40f; border-radius:8px;";
            }
            
            const textMe = isMe ? " (Εσείς)" : "";
            
            html += '<div style="' + style + '">';
            html += (i + 1) + ". Ταξί " + (d.taxiNumber || "---") + textMe;
            html += '</div>';
        }
        
        listDiv.innerHTML = html;
    });
}
        
function listenForCalls(uid) {
    console.log("Έναρξη ακρόασης κλήσεων για τον οδηγό:", uid);
    
    database.ref('calls').orderByChild('targetDriverId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        if (!calls) return;

        for (let id in calls) {
    const callData = calls[id];

    // 1. ΝΕΑ ΚΛΗΣΗ (Pending)
    if (callData.status === 'pending') {
        showIncomingCall(id, callData);
        // Παίξε ήχο...
    }

    // 2. Η ΚΛΗΣΗ ΕΓΙΝΕ ΑΠΟΔΕΚΤΗ (Accepted)
    if (callData.status === 'accepted') {
        // ΚΡΙΣΙΜΟ: Κρατάμε το ID στη μνήμη για να δουλέψει το "ΕΦΤΑΣΑ"
        window.currentCallId = id; 
        
        // Κλείνουμε το overlay αν έμεινε ανοιχτό
        const overlay = document.getElementById('incoming-call-overlay');
        if (overlay) overlay.style.display = 'none';
        
        // Εμφανίζουμε το UI της διαδρομής (το κουμπί ΕΦΤΑΣΑ)
        const tripUI = document.getElementById('active-trip-ui');
        if (tripUI) tripUI.style.display = 'block';

        function showTripOnMap() {
    if (!currentCallId) return;

    database.ref('calls/' + currentCallId).once('value', snap => {
        const call = snap.val();
        if (!call) return;

        // ΚΑΘΑΡΙΣΜΟΣ: Χρησιμοποιούμε passengerLat/Lng αντί για pLat/pLng
        const pLat = call.passengerLat; 
        const pLng = call.passengerLng;

        if (tripLine) map.removeLayer(tripLine);
        if (passengerMarker) map.removeLayer(passengerMarker);

        // Μαρκάρισμα επιβάτη
        passengerMarker = L.marker([pLat, pLng]).addTo(map).bindPopup("ΕΠΙΒΑΤΗΣ").openPopup();

        const start = userMarker.getLatLng(); // Χρησιμοποιούμε τη θέση του ΟΔΗΓΟΥ
        const end = { lat: pLat, lng: pLng };

        // Κλήση στο OSRM API για πραγματική διαδρομή 
        const osrmUrl = "https://router.project-osrm.org/route/v1/driving/" + 
                        start.lng + "," + start.lat + ";" + 
                        end.lng + "," + end.lat + "?overview=full&geometries=geojson";

        fetch(osrmUrl)
            .then(response => response.json())
            .then(data => {
                if (!data.routes || data.routes.length === 0) return;
                const coordinates = data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                
                // Σχεδίαση της διαδρομής
                tripLine = L.polyline(coordinates, { color: '#2980b9', weight: 6, opacity: 0.7 }).addTo(map);
                
                // Προσαρμογή χάρτη
                map.fitBounds(tripLine.getBounds(), { padding: [50, 50] });
                
                // Ενημέρωση Firebase για να βλέπει τη γραμμή και ο επιβάτης
                database.ref('calls/' + currentCallId).update({ routeCoords: coordinates });
            });
    });
}

window.requestTaxi = async function(targetId = null, taxiNum = null, passengers = 1, luggage = "Oxi", excludedDrivers = []) {
    let finalTargetId = targetId;
    let finalTaxiNum = taxiNum;

    console.log("Enarxi requestTaxi gia:", finalTaxiNum);

            let availableDrivers = Object.keys(drivers)
                .map(id => ({ id, ...drivers[id] }))

            finalTargetId = availableDrivers[0].id;
            finalTaxiNum = availableDrivers[0].taxiNumber || "---";
        } catch (err) {
            console.error("Error fetching drivers:", err);
            return;
        }
    }

    const callData = {
        passengerId: auth.currentUser.uid,
        targetDriverId: finalTargetId,
        passengerLat: lat,
        passengerLng: lng,
        passengers: passengers,
        luggage: luggage,
        status: 'pending',
        timestamp: Date.now()
    };

    try {
        const newCallRef = database.ref('calls').push();
        const callKey = newCallRef.key;
        await newCallRef.set(callData);
        watchCallStatus(callKey);
        
        if (finalTargetId && driverMarkers[finalTargetId]) driverMarkers[finalTargetId].closePopup();

        const statusBox = document.getElementById('status-box');
        if (statusBox) {
            statusBox.style.display = 'block';
            statusBox.style.background = '#f1c40f';
            statusBox.style.color = 'black';
        }

        let timeLeft = 20;
        const timerInterval = setInterval(async () => {
            timeLeft--;
            
            if (statusBox) {
                statusBox.innerHTML = "<b>Anazitisi Taxi...</b><br>Klisi sto Taxi " + finalTaxiNum + ": " + timeLeft + "s";
            }

            const snap = await database.ref('calls/' + callKey + '/status').once('value');
            const currentStatus = snap.val();

            if (currentStatus !== 'pending') {
                clearInterval(timerInterval);
                if (currentStatus === 'accepted' && statusBox) {
                     statusBox.innerHTML = "<b>To Taxi " + finalTaxiNum + " Apodextyke!</b>";
                     setTimeout(() => { statusBox.style.display = 'none'; }, 5000);
                }
                return;
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                await database.ref('calls/' + callKey).update({ status: 'timeout' });
                excludedDrivers.push(finalTargetId);
                window.requestTaxi(null, null, passengers, luggage, excludedDrivers);
            }
        }, 1000);

    } catch (e) {
        console.error("Sfalma stin klisi:", e);
    }
};
    
function listenForResponse(uid) {
    // Καθαρισμός παλιών κατά την έναρξη
    if (typeof cleanupOldCalls === "function") cleanupOldCalls(uid);

    database.ref('calls')
        .orderByChild('passengerId')
        .equalTo(uid)
        .limitToLast(1)
        .on('value', snap => {
            const calls = snap.val();
            const s = document.getElementById('status-box');
            
            if (!calls) {
                if (s) s.style.display = 'none';
                return;
            }

            for (let id in calls) {
                const c = calls[id];

                if (c.status === "accepted") { 
                    if (typeof map !== 'undefined') map.closePopup(); 
                    if (s) {
                        s.style.display = 'block'; 
                        s.style.background = '#27ae60'; 
                        s.style.color = 'white';
                        s.innerHTML = "✅ To taxi <b>" + (c.taxiNumber || "") + "</b> apodextyke! Erxetai se <b>" + (c.eta || "10") + "</b> lepta.";
                    }

                    if (c.routeCoords && typeof map !== 'undefined') {
                        if (window.passengerTripLine) map.removeLayer(window.passengerTripLine);
                        window.passengerTripLine = L.polyline(c.routeCoords, {
                            color: '#27ae60', 
                            weight: 5, 
                            opacity: 0.8,
                            dashArray: '10, 10'
                        }).addTo(map);

                        const bounds = L.latLngBounds(c.routeCoords);
                        map.fitBounds(bounds, {padding: [50, 50]});
                    }

                } else if (c.status === "pending") {
                    if (s) {
                        s.style.display = 'block';
                        s.style.background = '#f1c40f';
                        s.style.color = 'black';
                        s.innerHTML = "Anamoni gia apodoxi apo to Taxi...";
                    }
                } else if (c.status === "arrived") { 
                    if (s) {
                        s.style.background = '#f39c12'; 
                        s.style.color = 'white';
                        s.style.display = 'block';
                        s.innerHTML = '<div style="padding:5px;"><b>TO TAXI EFTASE!</b><br>Parakaloyme epivivasteite.<br><button onclick="confirmArrival(\'' + id + '\')" style="margin-top:10px; background:white; color:black; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">EPIVIVASI</button></div>';
                    }
                    if (window.passengerTripLine && typeof map !== 'undefined') {
                        map.removeLayer(window.passengerTripLine);
                        window.passengerTripLine = null;
                    }
                } else if (c.status === "rejected" || c.status === "timeout") {
                    if (s) {
                        s.style.display = 'block';
                        s.style.background = '#e74c3c';
                        s.style.color = 'white';
                        s.innerHTML = "To taxi den einai diathesimo. Ginetai klisi sto epomeno.";
                        setTimeout(function() { 
                            if(s && s.innerHTML.includes('taxi den einai')) {
                                s.style.display = 'none'; 
                            }
                        }, 5000);
                    }
                    if (window.passengerTripLine && typeof map !== 'undefined') {
                        map.removeLayer(window.passengerTripLine);
                        window.passengerTripLine = null;
                    }
                }
            } // Τέλος του for
        }); // Τέλος του .on
} // Τέλος της συνάρτησης - ΜΗΝ ΒΑΛΕΙΣ ΑΛΛΟ ΑΓΚΙΣΤΡΟ ΜΕΤΑ ΑΠΟ ΑΥΤΟ        

function confirmArrival(callId) {
    database.ref('calls/' + callId).update({ 
        status: "completed" 
    }).then(function() {
        var statusBox = document.getElementById('status-box');
        if (statusBox) statusBox.style.display = 'none';
        if (window.passengerTripLine) {
            map.removeLayer(window.passengerTripLine);
            window.passengerTripLine = null;
        }
        alert("Kali diadromi!");
    }).catch(function(err) {
console.error("Error updating status:", err);
    }); 
} // Κλείνει την confirmArrival

} // Κλείνει το block της γραμμής 829 (π.χ. το auth.onAuthStateChanged)

// Exports - Βεβαιώσου ότι τα ονόματα των συναρτήσεων είναι σωστά
window.toggleWorkStatus = typeof toggleWorkStatus !== 'undefined' ? toggleWorkStatus : null;
