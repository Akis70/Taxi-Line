    <script>
        let mapCentered = false; // Βάλε το στην αρχή των script σου
        function initMap(role, uid) {
    if (map) map.remove();
    // Ξεκινάμε με ένα default zoom αλλά χωρίς setView αν δεν έχουμε στίγμα
    map = L.map('map').setView([37.9838, 23.7275], 13); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            if (!userMarker) {
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("Είσαι εδώ");
            } else {
                userMarker.setLatLng([lat, lng]);
            }

            // Η ΜΑΓΙΚΗ ΔΙΟΡΘΩΣΗ: Κεντράρει μόνο την πρώτη φορά!
            if (!mapCentered) {
                map.setView([lat, lng], 16);
                mapCentered = true;
            }

            if (role === 'driver' && isOnline) {
                database.ref('active_drivers/' + uid).update({ lat, lng, lastSeen: Date.now() });
            }
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    if (role === 'passenger') {
        watchDrivers(); 
    }
}

        const database = firebase.database();
// ΣΥΝΑΡΤΗΣΗ NIGHT MODE
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
    localStorage.setItem('taxi-theme', mode);
}

// ΕΛΕΓΧΟΣ ΘΕΜΑΤΟΣ ΚΑΤΑ ΤΗ ΦΟΡΤΩΣΗ
window.addEventListener('load', () => {
    if (localStorage.getItem('taxi-theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
});
        let map, userMarker, myData = null;
        let driverMarkers = {}; 
        let isOnline = false;
        let currentCallId = null;
        let tripLine = null, passengerMarker = null;

   auth.onAuthStateChanged(user => {
    if (!user) { 
        window.location.href = "index.html"; 
        return; 
    }

    const uid = user.uid; // Ορίζουμε το uid από το αντικείμενο user

    database.ref('users/' + uid).once('value', snap => {
        myData = snap.val(); // Αποθηκεύουμε τα δεδομένα στην global μεταβλητή myData

        // ΕΛΕΓΧΟΣ ΕΓΚΡΙΣΗΣ
        if (myData.role === 'driver' && myData.status === 'pending') {
            document.getElementById('main-content').innerHTML = `
                <div class="card" style="background: #f39c12; color: white; text-align:center; padding:30px;">
                    <span style="font-size:50px;">⏳</span>
                    <h2>Σε αναμονή έγκρισης</h2>
                    <p>Τα στοιχεία σας (Πινακίδα: ${myData.plate || '---'}) ελέγχονται από τον διαχειριστή.</p>
                    <p>Θα μπορείτε να συνδεθείτε μόλις εγκριθεί ο λογαριασμός σας.</p>
                    <button onclick="auth.signOut()" class="btn" style="background:white; color:black; margin-top:20px;">ΑΠΟΣΥΝΔΕΣΗ</button>
                </div>`;
            return; // Εδώ σταματάμε, δεν τρέχουμε την initMap ούτε τη renderView
        }

        // ΑΝ ΕΙΝΑΙ APPROVED Η ΕΠΙΒΑΤΗΣ, ΠΡΟΧΩΡΑΜΕ ΚΑΝΟΝΙΚΑ
        initMap(myData.role, uid);
        renderView(uid);
        
        // Ενημέρωση του user-tag στην status bar
        document.getElementById('user-tag').innerText = myData.email;
    });
});

        function renderView(uid) {
    const container = document.getElementById('main-content');
    
    if (myData.role === 'driver') {
        // --- ΠΑΝΕΛ ΟΔΗΓΟΥ ---
        if (!document.getElementById('priority-list')) {
            container.innerHTML = `
                <div id="waiting-ui" class="card">
                    <h2>📋 Σειρά Προτεραιότητας</h2>
                    <div id="priority-list" style="margin-bottom:20px;">Αναζήτηση...</div>
                    <button id="work-btn" class="btn btn-yellow" onclick="toggleWork('${uid}')">GO ONLINE</button>
                    <button onclick="auth.signOut()" class="logout-btn-footer" style="margin-top:20px; text-decoration:none; color:#e74c3c; background:none; border:none; cursor:pointer; font-weight:bold;">❌ Έξοδος</button>
                </div>
                <div id="map-container">
                    <div class="card">
                        <h3>📍 Διαδρομή</h3>
                        <div id="map"></div>
                        <div id="driver-actions"></div>
                    </div>
                </div>`;
            
            initMap('driver', uid);
            watchPriority(uid);
            listenForCalls(uid);
        }
    } else {
        // --- ΠΑΝΕΛ ΕΠΙΒΑΤΗ (ΔΙΟΡΘΩΜΕΝΟ) ---
        container.innerHTML = `
            <div class="card">
                <h3 style="margin-top:0;">📍 Ταξί κοντά σας</h3>
                <div id="map"></div>
            </div>

            <div id="status-box" style="display:none; padding:15px; border-radius:10px; color:white; font-weight:bold; margin-bottom:15px; text-align:center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>

            <div class="quick-call-footer" style="text-align:center;">
                <button onclick="requestTaxi()" class="btn btn-yellow" style="margin-bottom:10px; width:100%; font-weight:bold;">
                    🚀 ΑΠΟΣΤΟΛΗ ΑΙΤΗΜΑΤΟΣ (App)
                </button>
                
                <div style="margin: 10px 0; font-weight: bold; color: #7f8c8d; font-size:14px;">— Ή —</div>
                
                <a href="tel:+306999222446" class="btn" style="background:#3498db; text-decoration:none; display:block; color:white; line-height:45px; height:45px; margin-bottom:15px; border-radius:12px; font-weight:bold;">
                    📞 ΚΛΗΣΗ ΣΤΟ ΚΕΝΤΡΟ
                </a>
                
                <button onclick="auth.signOut()" class="logout-btn-footer" style="background:none; border:none; color:#7f8c8d; cursor:pointer; text-decoration:underline;">Αποσύνδεση</button>
                
                <footer style="margin-top: 25px; padding: 15px 0; border-top: 1px solid #eee; font-size: 11px; color: #bdc3c7;">
                    <p>© 2026 Taxi-Line. All rights reserved.</p>
                </footer>
            </div>`;        
            setTimeout(() => {
            initMap('passenger', uid);
            listenForResponse(uid);
        }, 100); 
    }
}  
   function initMap(role, uid) {
    const mapDiv = document.getElementById('map');
    if (!mapDiv) return; // Αν δεν βρει το div, σταμάτα για να μη σκάσει το error

    // Αν υπάρχει ήδη χάρτης, τον καταστρέφουμε πλήρως για να γίνει reset
    if (map !== undefined && map !== null) {
        map.remove();
    }

    map = L.map('map').setView([37.9838, 23.7275], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            if (!userMarker) {
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("Είσαι εδώ");
            } else {
                userMarker.setLatLng([lat, lng]);
            }

            // Η ΜΑΓΙΚΗ ΔΙΟΡΘΩΣΗ: Κεντράρει μόνο την πρώτη φορά!
            if (!mapCentered) {
                map.setView([lat, lng], 16);
                mapCentered = true;
            }

            if (role === 'driver' && isOnline) {
                database.ref('active_drivers/' + uid).update({ lat, lng, lastSeen: Date.now() });
            }
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    if (role === 'passenger') {
        watchDrivers(); 
    }
}
        // --- Driver Functions ---
        function stopAlertSound() {
            const audio = document.getElementById('beep-sound');
            audio.pause();
            audio.currentTime = 0;
            audio.loop = false;
        }

function toggleWork(uid) {
    // ΕΛΕΓΧΟΣ: Αν δεν υπάρχει ακόμα στίγμα, σταμάτα για να μη σκάσει το error
    if (!userMarker) {
        alert("Περιμένετε λίγο να εντοπιστεί η θέση σας στον χάρτη!");
        return; 
    }

    const audio = document.getElementById('beep-sound');
    // Προετοιμασία ήχου για να επιτρέψει ο browser την αναπαραγωγή αργότερα
    audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});

    if (!isOnline) {
        // --- ΕΝΕΡΓΕΙΑ: GO ONLINE ---
        isOnline = true;
        document.getElementById('work-btn').innerText = "GO OFFLINE";
        document.getElementById('work-btn').className = "btn btn-red";

        const driverRef = database.ref('active_drivers/' + uid);

        // 1. Ρύθμιση "Διαθήκης": Αν ο browser κλείσει απότομα, διέγραψε το ταξί από τη βάση
        driverRef.onDisconnect().remove();

        // 2. Αρχική εγγραφή στη βάση
        driverRef.set({
            lat: userMarker ? userMarker.getLatLng().lat : 0,
            lng: userMarker ? userMarker.getLatLng().lng : 0,
            taxiNumber: myData.taxiNumber || "---", 
            timestamp: Date.now()
        });

        // 3. Ξεκινάμε το "ρολόι" ενημέρωσης ανά 10 δευτερόλεπτα (αν δεν έχει ξεκινήσει ήδη)
        if (!window.locationUpdateInterval) {
            window.locationUpdateInterval = setInterval(() => {
                if (isOnline) {
                    const pos = userMarker.getLatLng();
                    driverRef.update({ 
                        lat: pos.lat, 
                        lng: pos.lng,
                        timestamp: Date.now() 
                    });
                }
            }, 10000);
        }

    } else {
        // --- ΕΝΕΡΓΕΙΑ: GO OFFLINE ---
        isOnline = false;

        // 1. Σταματάμε το "ρολόι" ενημέρωσης
        if (window.locationUpdateInterval) {
            clearInterval(window.locationUpdateInterval);
            window.locationUpdateInterval = null;
        }

        // 2. Ακυρώνουμε το onDisconnect (αφού βγαίνουμε κανονικά)
        database.ref('active_drivers/' + uid).onDisconnect().cancel();

        // 3. Διαγράφουμε το ταξί από τους ενεργούς οδηγούς αμέσως
        database.ref('active_drivers/' + uid).remove();

        // 4. Επαναφορά εμφάνισης κουμπιού
        document.getElementById('work-btn').innerText = "GO ONLINE";
        document.getElementById('work-btn').className = "btn btn-yellow";
    }
}
        function listenForCalls(myUid) {
    database.ref('calls').on('value', snap => {
        const calls = snap.val();
        if (!calls) return;

        for (let id in calls) {
            const call = calls[id];

            // ΕΛΕΓΧΟΣ: Χτύπα ΜΟΝΟ αν η κλήση προορίζεται για εσένα
            if (call.targetDriverId === myUid && call.status === 'pending') {
                currentCallId = id; 
                showIncomingCall(call); // Δείχνει τη μαύρη οθόνη "Αποδοχή/Απόρριψη"
                
                // Παίζει τον ήχο (βεβαιώσου ότι έχεις το audio element με id='beep-sound')
                const audio = document.getElementById('beep-sound');
                if (audio) audio.play().catch(e => console.log("Ήχος μπλοκαρισμένος"));
            }
        }
    });
}
        function acceptCall() {
    const eta = prompt("Σε πόσα λεπτά θα είστε εκεί;", "10");
    if (eta === null) return; // Αν πατήσει ακύρωση στο prompt
    
    // Σταματάμε τον ήχο αν παίζει
    const audio = document.getElementById('beep-sound');
    if (audio) { audio.pause(); audio.currentTime = 0; }

    // Ενημέρωση της κλήσης στη Firebase
    database.ref('calls/' + currentCallId).update({ 
        status: "accepted", 
        eta: eta,
        taxiNumber: myData.taxiNumber || "---"
    }).then(() => {
        // Κλείνουμε το Overlay
        document.getElementById('incoming-call-overlay').style.display = 'none';
        
        // Εμφανίζουμε τον χάρτη (αν ήταν κρυμμένος)
        const mapContainer = document.getElementById('map-container');
        if (mapContainer) mapContainer.style.display = 'block';
        
        // Φρεσκάρουμε τον χάρτη για να μην εμφανίζεται γκρίζος
        setTimeout(() => { 
            map.invalidateSize(); 
            if (typeof showTripOnMap === "function") {
                showTripOnMap(); 
            }
        }, 400);
    }).catch(err => {
        console.error("Σφάλμα στην αποδοχή:", err);
        alert("Κάτι πήγε στραβά με την αποδοχή της κλήσης.");
    });
}
        function rejectCall() {
            stopAlertSound();
            database.ref('calls/' + currentCallId).update({ status: "rejected" });
            document.getElementById('incoming-call-overlay').style.display = 'none';
        }

        function watchPriority(uid) {
            database.ref('active_drivers').on('value', snap => {
                const listDiv = document.getElementById('priority-list');
                if (!listDiv) return;
                const drivers = snap.val();
                if (!drivers) { listDiv.innerHTML = "Κανένας οδηγός online"; return; }
                let sorted = Object.keys(drivers).map(id => ({id, ...drivers[id]})).sort((a,b) => a.timestamp - b.timestamp);
                let html = "";
                sorted.forEach((d, i) => {
                    const isMe = d.id === uid ? "background:#f1c40f22; font-weight:bold; border:1px solid #f1c40f; border-radius:8px;" : "";
                    html += `<div style="padding:12px; border-bottom:1px solid #eee; text-align:left; font-size:18px; ${isMe}">${i+1}. Ταξί ${d.taxiNumber} ${d.id===uid?'(Εσείς)':''}</div>`;
                });
                listDiv.innerHTML = html;
            });
        }

        function showTripOnMap() {
    database.ref('calls/' + currentCallId).once('value', snap => {
        const call = snap.val();
        if (!call) return;

        // Καθαρισμός προηγούμενων στοιχείων
        if (tripLine) map.removeLayer(tripLine);
        if (passengerMarker) map.removeLayer(passengerMarker);

        // Μαρκάρισμα επιβάτη
        passengerMarker = L.marker([call.pLat, call.pLng]).addTo(map).bindPopup("ΕΠΙΒΑΤΗΣ").openPopup();

        const start = userMarker.getLatLng();
        const end = { lat: call.pLat, lng: call.pLng };

        // Κλήση στο OSRM API για πραγματική διαδρομή στους δρόμους
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`)
            .then(response => response.json())
            .then(data => {
                const coordinates = data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                
                // Σχεδίαση της διαδρομής με κανονικές στροφές
                tripLine = L.polyline(coordinates, { color: '#2980b9', weight: 6, opacity: 0.7 }).addTo(map);
                
                // Προσαρμογή του χάρτη να φαίνεται όλη η διαδρομή
                map.fitBounds(tripLine.getBounds(), { padding: [50, 50] });
                
                // Αποθήκευση της διαδρομής στη βάση για να τη βλέπει ΚΑΙ ο επιβάτης
                database.ref('calls/' + currentCallId).update({ routeCoords: coordinates });
            });

        document.getElementById('driver-actions').innerHTML = `<button class="btn btn-yellow" onclick="arrivedAtPassenger()">🔔 ΕΦΤΑΣΑ ΣΤΟΝ ΕΠΙΒΑΤΗ</button>`;
    });
}

       function arrivedAtPassenger() {
    // 1. Θέτουμε το isOnline σε false για να σταματήσει το αυτόματο update τοποθεσίας στη βάση
    isOnline = false;

    // 2. Αφαιρούμε οριστικά τον οδηγό από τα ενεργά ταξί
    database.ref('active_drivers/' + auth.currentUser.uid).remove();

    // 3. Ενημερώνουμε την κλήση
    database.ref('calls/' + currentCallId).update({ status: "arrived" }).then(() => {
        document.getElementById('map').style.display = 'none';
        document.getElementById('driver-actions').innerHTML = `
            <div style="padding:20px;">
                <h2 style="color:#2c3e50;">Περιμένετε την επιβίβαση...</h2>
                <p>Ο επιβάτης ενημερώθηκε ότι φτάσατε.</p>
                <button class="btn btn-red" onclick="completeTrip()">🏁 ΤΕΛΟΣ ΔΙΑΔΡΟΜΗΣ</button>
            </div>`;
    });
}
     function completeTrip() {
    database.ref('calls/' + currentCallId).update({ status: "completed" });
    
    currentCallId = null;
    isOnline = false; // Παραμένει offline μέχρι να πατήσει το κουμπί

    document.getElementById('map-container').style.display = 'none';
    document.getElementById('waiting-ui').style.display = 'block';
    
    const workBtn = document.getElementById('work-btn');
    if (workBtn) {
        workBtn.innerText = "GO ONLINE";
        workBtn.className = "btn btn-yellow";
    }
}
        // --- Passenger Functions ---

function watchDrivers() {
    database.ref('active_drivers').on('value', snap => {
        const drivers = snap.val() || {};
        const now = Date.now();

        // 1. ΚΑΘΑΡΙΣΜΟΣ: Σβήνουμε από τον χάρτη όσους βγήκαν Offline ή "χάθηκαν"
        for (let id in driverMarkers) {
            if (!drivers[id] || (now - (drivers[id].timestamp || 0) > 60000)) {
                map.removeLayer(driverMarkers[id]);
                delete driverMarkers[id];
            }
        }

        // 2. ΕΝΗΜΕΡΩΣΗ / ΔΗΜΙΟΥΡΓΙΑ
        for (let id in drivers) {
            const d = drivers[id];
            
            // Ανοχή 60 δευτερόλεπτα για να είναι σταθερό το εικονίδιο
            if (now - (d.timestamp || 0) > 60000) continue;

            let displayPlate = d.taxiNumber || "TAXI";

            if (!driverMarkers[id]) {
                // Δημιουργία νέου marker αν δεν υπάρχει
                driverMarkers[id] = L.marker([d.lat, d.lng], {
                    icon: L.divIcon({ 
                        html: `
                            <div style="position: relative; display: flex; flex-direction: column; align-items: center;">
                                <div style="background: #000; color: #f1c40f; font-weight: bold; font-size: 11px; padding: 1px 4px; border: 1px solid #f1c40f; border-radius: 3px; position: absolute; top: -10px; white-space: nowrap; z-index: 10; box-shadow: 0px 2px 4px rgba(0,0,0,0.5);">
                                    ${displayPlate}
                                </div>
                                <div style="font-size: 32px; line-height: 1;">🚕</div>
                            </div>`, 
                        className: 'custom-icon', iconSize: [40, 40], iconAnchor: [20, 20]
                    })
                }).addTo(map).bindPopup(`
                    <div style="text-align:center; font-family: sans-serif;">
                        <b style="font-size:16px;">Ταξί: ${displayPlate}</b><hr>
                        👥 Επιβάτες: <select id="pax_${id}" style="padding:2px;"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select><br><br>
                        📦 <label><input type="checkbox" id="lug_${id}"> Με αποσκευές</label><br><br>
                        <button class="btn btn-yellow" style="width:100%; font-weight:bold;" onclick="handleBooking('${id}', '${displayPlate}')">ΚΛΗΣΗ ΤΑΞΙ</button>
                    </div>`);
            } else { 
               // ΕΝΗΜΕΡΩΣΗ ΘΕΣΗΣ: Εδώ ο χάρτης κουνάει το ταξί χωρίς να κλείσει το Popup!
                driverMarkers[id].setLatLng([d.lat, d.lng]); 
            }
        } // Αυτό κλείνει το for (let id in drivers)
    }); // Αυτό κλείνει το .on('value', ...
} // Αυτό κλείνει τη function watchDrivers()

function handleBooking(driverId, taxiNum) {
    const pax = document.getElementById(`pax_${driverId}`).value;
    const lug = document.getElementById(`lug_${driverId}`).checked ? "Ναι" : "Όχι";

    // Καλούμε την κλήση στέλνοντας τα έξτρα στοιχεία
    requestTaxi(driverId, taxiNum, pax, lug);
}

async function requestTaxi(targetId = null, taxiNum = null, passengers = 1, luggage = "Όχι") {
    let finalTargetId = targetId;
    let finalTaxiNum = taxiNum;

    // 1. Αν δεν έχουμε targetId (δηλαδή πατήθηκε το γενικό κουμπί), βρες τον Νο 1 στη σειρά
    if (!finalTargetId) {
        const snapshot = await database.ref('active_drivers').once('value');
        const drivers = snapshot.val();
        
        if (!drivers) {
            alert("Δεν υπάρχει διαθέσιμο ταξί αυτή τη στιγμή.");
            return;
        }

        // Ταξινόμηση βάσει timestamp (ο πιο παλιός είναι ο πρώτος)
        let sortedDrivers = Object.keys(drivers)
            .map(id => ({ id, ...drivers[id] }))
            .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

        finalTargetId = sortedDrivers[0].id;
        finalTaxiNum = sortedDrivers[0].taxiNumber || "---";
    }

    // 2. Προετοιμασία δεδομένων κλήσης
    const lat = userMarker.getLatLng().lat;
    const lng = userMarker.getLatLng().lng;

    const callData = {
        passengerId: auth.currentUser.uid,
        targetDriverId: finalTargetId,
        passengerLat: lat,
        passengerLng: lng,
        passengers: passengers,
        luggage: luggage,
        status: 'pending',
        timestamp: Date.now()
    };

    // 3. Αποστολή στη Firebase
    try {
        await database.ref('calls').push().set(callData);
        
        // Κλείσιμο Popups στον χάρτη
        if (finalTargetId && driverMarkers[finalTargetId]) {
            driverMarkers[finalTargetId].closePopup();
        }
        map.closePopup();

        // Ενημέρωση UI επιβάτη
        const statusBox = document.getElementById('status-box');
        if (statusBox) {
            statusBox.style.display = 'block';
            statusBox.style.background = '#f1c40f';
            statusBox.innerHTML = `<b>Αίτημα Εστάλη!</b><br>Αναμονή αποδοχής από το Ταξί ${finalTaxiNum}...`;
        }
        
    } catch (e) {
        console.error("Σφάλμα στην κλήση:", e);
        alert("Αποτυχία αποστολής αιτήματος.");
    }
}
      function listenForResponse(uid) {
    database.ref('calls').orderByChild('passengerId').equalTo(uid).on('value', snap => {
        const calls = snap.val();
        const s = document.getElementById('status-box');
        
        if (!calls) { 
            if (s) s.style.display = 'none'; 
            if (window.passengerTripLine) map.removeLayer(window.passengerTripLine);
            return; 
        }

        for (let id in calls) {
            const c = calls[id];

            // ΔΙΟΡΘΩΣΗ: Ελέγχουμε το status και το targetDriverId
            if (c.status === "accepted") { 
                map.closePopup(); 
                s.style.display = 'block'; 
                s.style.background = '#27ae60'; 
                s.style.color = 'white';
                // Δείχνουμε το taxiNumber που έγραψε ο οδηγός κατά την αποδοχή
                s.innerHTML = `✅ Το ταξί <b>${c.taxiNumber || ''}</b> αποδέχτηκε! Έρχεται σε <b>${c.eta || '10'}</b> λεπτά.`; 

                if (c.routeCoords) {
                    if (window.passengerTripLine) map.removeLayer(window.passengerTripLine);
                    
                    window.passengerTripLine = L.polyline(c.routeCoords, {
                        color: '#27ae60', 
                        weight: 5, 
                        opacity: 0.8,
                        dashArray: '10, 10'
                    }).addTo(map);

                    const bounds = L.latLngBounds(c.routeCoords);
                    map.fitBounds(bounds, {padding: [50, 50]});
                }

            } else if (c.status === "pending") {
                s.style.display = 'block';
                s.style.background = '#f1c40f';
                s.style.color = 'black';
                s.innerHTML = `⏳ Αναμονή για αποδοχή από το Ταξί...`;

            } else if (c.status === "arrived") { 
                s.style.background = '#f39c12'; 
                s.style.color = 'white';
                s.style.display = 'block';
                s.innerHTML = `
                    <div style="padding:5px;">
                        🚕 ΤΟ ΤΑΞΙ ΕΦΤΑΣΕ!<br>
                        <button onclick="confirmArrival('${id}')" style="margin-top:10px; background:white; color:black; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">ΕΠΙΒΙΒΑΣΗ</button>
                    </div>`;
                
                if (window.passengerTripLine) {
                    map.removeLayer(window.passengerTripLine);
                    window.passengerTripLine = null;
                }

            } else if (c.status === "rejected" || c.status === "timeout") {
                s.style.display = 'block';
                s.style.background = '#e74c3c';
                s.style.color = 'white';
                s.innerHTML = `❌ Το ταξί δεν είναι διαθέσιμο. Δοκιμάστε το επόμενο ή καλέστε στο κέντρο.`;
                if (window.passengerTripLine) map.removeLayer(window.passengerTripLine);
                
                // Αυτόματο κλείσιμο του μηνύματος μετά από 5 δευτ.
                setTimeout(() => { if(s.innerHTML.includes('❌')) s.style.display = 'none'; }, 5000);
            }
        }
    });
}
        function confirmArrival(callId) {
    // Όταν ο επιβάτης πατάει ΟΚ, κλείνουμε το status box
    // Προαιρετικά μπορούμε να ενημερώσουμε τη βάση ότι ο επιβάτης επιβιβάστηκε
    document.getElementById('status-box').style.display = 'none';
    alert("Καλή διαδρομή!");
}
