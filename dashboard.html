<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi-Line | Dashboard</title>
<style>
:root{--primary:#f1c40f;--secondary:#2c3e50;--bg:#f4f4f4;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);margin:0;padding:0;overflow-x:hidden;}
.status-bar{background:var(--secondary);color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
.card{background:#fff;margin:10px;padding:15px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);text-align:center;}
#map{width:100%;height:420px;border-radius:10px;background:#ddd;border:2px solid #fff;}
#map-container{display:none;}
.btn{padding:15px 20px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;width:90%;max-width:300px;margin:10px auto;display:block;text-decoration:none;text-align:center;font-size:16px;}
.btn-yellow{background:var(--primary);color:#000;box-shadow:0 4px 0 #d4ac0d;}
.btn-red{background:#e74c3c;color:#fff;}
.quick-call-footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px 0;box-shadow:0 -4px 15px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;z-index:1001;}
.logout-btn-footer{background:transparent;color:#95a5a6;font-size:13px;text-decoration:underline;border:none;cursor:pointer;padding:5px;margin-top:5px;}
.taxi-emoji{font-size:38px;filter:drop-shadow(2px 2px 2px rgba(0,0,0,.4));margin-top:-5px;}
#incoming-call-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);color:#fff;z-index:9999;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
#status-box{display:none;position:fixed;bottom:100px;left:5%;width:90%;color:#fff;padding:15px;border-radius:12px;z-index:2000;text-align:center;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,.3);}
.theme-toggle{cursor:pointer;font-size:20px;background:none;border:none;color:#fff;}
body.dark-mode{background:#121212!important;color:#fff!important;--bg:#121212;--secondary:#000;}
body.dark-mode .card{background:#1e1e1e!important;color:#fff;border:1px solid #333;box-shadow:0 4px 12px rgba(0,0,0,.5);}
body.dark-mode .status-bar{background:#000!important;border-bottom:1px solid #f1c40f;}
body.dark-mode #map{filter:invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);}
body.dark-mode footer{color:#aaa;}
</style>
</head>
<body>
<audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
<div id="incoming-call-overlay">
<h1 style="color:var(--primary);font-size:35px;">🔔 ΝΕΑ ΚΛΗΣΗ</h1>
<div id="call-details" style="font-size:22px;margin:20px;border:1px solid #444;padding:20px;border-radius:10px;"></div>
<button class="btn btn-yellow" onclick="acceptCall()">ΑΠΟΔΟΧΗ</button>
<button class="btn btn-red" onclick="rejectCall()" style="margin-top:20px;">ΑΠΟΡΡΙΨΗ</button>
</div>
<div id="status-box"></div>
<div class="status-bar">
<span>🚕 Taxi-Line</span>
<div style="display:flex;align-items:center;">
<button class="theme-toggle" onclick="toggleTheme()" style="cursor:pointer;background:none;border:none;font-size:18px;margin-right:10px;">🌓</button>
<span id="user-tag" style="font-size:11px;opacity:0.8;"></span>
</div>
</div>
<div id="main-content">
<div class="card">🔄 Συγχρονισμός δεδομένων...</div>
</div>
<footer style="text-align:center;padding:20px;color:#7f8c8d;font-size:12px;">
<p>Taxi-Line &copy; 2026 | All rights reserved.</p>
</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",authDomain:"taxi-line-f149e.firebaseapp.com",databaseURL:"https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",projectId:"taxi-line-f149e",storageBucket:"taxi-line-f149e.firebasestorage.app",messagingSenderId:"1086896421565",appId:"1:1086896421565:web:e498b8916fd95a04e7d5d4"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const database=firebase.database();
function toggleTheme(){document.body.classList.toggle('dark-mode');const mode=document.body.classList.contains('dark-mode')?'dark':'light';localStorage.setItem('taxi-theme',mode);}
window.addEventListener('load',()=>{if(localStorage.getItem('taxi-theme')==='dark'){document.body.classList.add('dark-mode');}});
let map,userMarker,myData=null;
let driverMarkers={};
let isOnline=false;
let currentCallId=null;
let tripLine=null,passengerMarker=null;
auth.onAuthStateChanged(user=>{
if(!user){window.location.href="index.html";return;}
database.ref('users/'+user.uid).on('value',snap=>{
myData=snap.val();
if(!myData)return;
document.getElementById('user-tag').innerText=myData.email;
if(myData.role==='driver'){database.ref('active_drivers/'+user.uid).remove();}
renderView(user.uid);
});
});
</script>
</body>
</html>
