<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Taxi-Line | Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .user-box { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #ccc; }
        .pending { border-left-color: #e74c3c; }
        .approved { border-left-color: #27ae60; }
        button { cursor: pointer; padding: 5px 10px; margin-left: 5px; }
    </style>
</head>
<body>
    <h2>🛠️ Διαχείριση Οδηγών</h2>
    <div id="user-list">Φόρτωση λίστας...</div>
    <br><a href="dashboard.html">⬅ Επιστροφή</a>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e",
            storageBucket: "taxi-line-f149e.firebasestorage.app",
            messagingSenderId: "1086896421565",
            appId: "1:1086896421565:web:e498b8916fd95a04e7d5d4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            const users = snap.val();
            if (!users) { list.innerHTML = "Δεν βρέθηκαν χρήστες."; return; }

            for (let id in users) {
                const u = users[id];
                if (u.role === 'driver') {
                    const status = u.approved ? 'approved' : 'pending';
                    list.innerHTML += `
                        <div class="user-box ${status}">
                            <strong>${u.email}</strong><br>
                            Πινακίδα: ${u.plate || '---'} | Κατάσταση: ${u.approved ? '✅ Έγκυρος' : '⏳ Εκκρεμεί'}
                            <br>
                            ${!u.approved ? `<button onclick="approve('${id}')" style="background:green;color:white">ΕΓΚΡΙΣΗ</button>` : ''}
                        </div>`;
                }
            }
        });

        function approve(uid) { database.ref('users/' + uid).update({ approved: true }); }
    </script>
</body>
</html>
