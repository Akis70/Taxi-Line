<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Taxi-Line | Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .user-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ccc; }
        .is-driver { border-left-color: #f1c40f; }
        .approved { border-left-color: #27ae60; }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 4px; }
        .btn-approve { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <h2>🛠️ Διαχείριση Οδηγών (Admin)</h2>
    <div id="status" style="color: blue; margin-bottom: 10px;">Αναμονή για σύνδεση...</div>
    <div id="user-list"></div>
    <br><a href="dashboard.html">⬅ Επιστροφή</a>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Έλεγχος αν η βάση απαντάει
        database.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            const status = document.getElementById('status');
            const users = snap.val();
            
            if (!users) {
                status.innerText = "⚠️ Συνδέθηκε, αλλά ο φάκελος 'users' είναι άδειος.";
                return;
            }

            status.innerText = "✅ Δεδομένα ελήφθησαν επιτυχώς!";
            list.innerHTML = "";

            for (let id in users) {
                const u = users[id];
                if (u.role === 'driver') {
                    const approvedClass = u.approved ? 'approved' : '';
                    list.innerHTML += `
                        <div class="user-card is-driver ${approvedClass}">
                            <strong>📧 ${u.email}</strong><br>
                            Πινακίδα: ${u.plate || '---'} | Έγκριση: ${u.approved ? '✅' : '⏳'}
                            <br><br>
                            ${!u.approved ? `<button class="btn-approve" onclick="approve('${id}')">ΕΓΚΡΙΣΗ</button>` : ''}
                        </div>`;
                }
            }
        }, error => {
            document.getElementById('status').innerText = "❌ ΣΦΑΛΜΑ: " + error.message;
        });

        function approve(uid) {
            database.ref('users/' + uid).update({ approved: true });
        }
    </script>
</body>
</html>
