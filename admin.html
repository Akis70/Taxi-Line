<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Line | Διαχείριση</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .user-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #ccc; }
        .pending { border-left-color: #e74c3c; background: #fff5f5; }
        .approved { border-left-color: #27ae60; }
        .btn-approve { background: #27ae60; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🛠️ Διαχείριση Οδηγών & Χρηστών</h2>
    <div id="user-list"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { /* ... Ίδιο Config ... */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loadUsers() {
            database.ref('users').on('value', snap => {
                const users = snap.val();
                const container = document.getElementById('user-list');
                container.innerHTML = "";

                for (let id in users) {
                    const u = users[id];
                    const isDriver = u.role === 'driver';
                    const statusClass = isDriver ? (u.approved ? 'approved' : 'pending') : '';
                    
                    container.innerHTML += `
                        <div class="user-card ${statusClass}">
                            <strong>${u.email}</strong> (${u.role})<br>
                            Τηλ: ${u.phone} | ${isDriver ? 'Πινακίδα: ' + u.plate : ''}<br>
                            ${isDriver && !u.approved ? `<button class="btn-approve" onclick="approveDriver('${id}')">✅ ΕΓΚΡΙΣΗ</button>` : ''}
                            <button class="btn-delete" onclick="deleteUser('${id}')">🗑️ Διαγραφή</button>
                        </div>`;
                }
            });
        }

        function approveDriver(uid) {
            if(confirm("Θέλετε να εγκρίνετε αυτόν τον οδηγό;")) {
                database.ref('users/' + uid).update({ approved: true });
            }
        }

        function deleteUser(uid) {
            if(confirm("Οριστική διαγραφή;")) database.ref('users/' + uid).remove();
        }

        loadUsers();
    </script>
</body>
</html>
