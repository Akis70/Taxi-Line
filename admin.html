<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DEBUG ADMIN</title>
</head>
<body style="font-family:sans-serif; padding:20px;">

    <h2>Διαγνωστικό Πάνελ Admin</h2>
    <div id="debug-info" style="background:#eee; padding:10px; margin-bottom:20px; border:1px solid #ccc;">
        Κατάσταση: Αναμονή για δεδομένα...
    </div>

    <div id="user-list"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ΕΝΤΟΛΗ ΑΜΕΣΗΣ ΑΝΑΓΝΩΣΗΣ
        database.ref('users').on('value', snap => {
            const debug = document.getElementById('debug-info');
            const list = document.getElementById('user-list');
            const data = snap.val();

            console.log("RAW DATA:", data); // Αυτό θα το δούμε στο F12

            if (!data) {
                debug.innerHTML = "❌ Η βάση επέστρεψε NULL. (Ο κόμβος 'users' είναι άδειος ή δεν υπάρχει πρόσβαση)";
                return;
            }

            debug.innerHTML = "✅ Βρέθηκαν δεδομένα! Σχεδιασμός λίστας...";
            list.innerHTML = "";

            // Εμφάνιση ΤΩΝ ΠΑΝΤΩΝ χωρίς φίλτρα για να δούμε αν έρχεται κάτι
            Object.keys(data).forEach(id => {
                const user = data[id];
                const div = document.createElement('div');
                div.style.border = "1px solid black";
                div.style.margin = "5px";
                div.style.padding = "10px";
                
                div.innerHTML = `
                    <strong>Email:</strong> ${user.email} <br>
                    <strong>Ρόλος:</strong> ${user.role} <br>
                    <strong>Έγκριση:</strong> ${user.approved} <br>
                    <button onclick="makeActive('${id}')">ΕΓΚΡΙΣΗ</button>
                `;
                list.appendChild(div);
            });
        }, error => {
            document.getElementById('debug-info').innerHTML = "❌ ΣΦΑΛΜΑ FIREBASE: " + error.message;
        });

        function makeActive(uid) {
            database.ref('users/' + uid).update({ approved: true });
        }
    </script>
</body>
</html>
