<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Taxi-Line | Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .user-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #ccc; }
        .is-driver { border-left-color: #f1c40f; }
        .is-approved { border-left-color: #27ae60; }
        .tag { font-size: 0.8em; padding: 3px 7px; border-radius: 4px; background: #eee; }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>🛠️ Διαχείριση Χρηστών (Admin)</h2>
    <div id="user-list">Αναζήτηση στη βάση δεδομένων...</div>
    <br><a href="dashboard.html">⬅ Επιστροφή στο Dashboard</a>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCzXoeqv3VODlSH6j3HrqI36ixYYdEjjI",
            authDomain: "taxi-line-f149e.firebaseapp.com",
            databaseURL: "https://taxi-line-f149e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taxi-line-f149e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Εμφάνιση ΟΛΩΝ των χρηστών για να δούμε τι υπάρχει στη βάση
        database.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            const users = snap.val();
            
            if (!users) {
                list.innerHTML = "⚠️ Δεν βρέθηκαν χρήστες στον κόμβο 'users' της Firebase.";
                return;
            }

            list.innerHTML = "";
            for (let id in users) {
                const u = users[id];
                const role = u.role || 'passenger';
                const approved = u.approved || false;
                
                let cardClass = (role === 'driver') ? 'is-driver' : '';
                if (approved) cardClass = 'is-approved';

                list.innerHTML += `
                    <div class="user-card ${cardClass}">
                        <strong>📧 ${u.email || 'Χωρίς Email'}</strong> <span class="tag">${role}</span><br>
                        <small>ID: ${id}</small><br>
                        ${role === 'driver' ? `🚗 Πινακίδα: ${u.plate || '---'} | Έγκριση: ${approved ? '✅' : '⏳'}` : ''}
                        <div class="actions">
                            ${(role === 'driver' && !approved) ? `<button onclick="updateUser('${id}', {approved: true})" style="background:#27ae60; color:white;">ΕΓΚΡΙΣΗ</button>` : ''}
                            <button onclick="deleteUser('${id}')" style="background:#e74c3c; color:white;">ΔΙΑΓΡΑΦΗ</button>
                        </div>
                    </div>`;
            }
        });

        function updateUser(uid, data) { database.ref('users/' + uid).update(data); }
        function deleteUser(uid) { if(confirm("Οριστική διαγραφή;")) database.ref('users/' + uid).remove(); }
    </script>
</body>
</html>
